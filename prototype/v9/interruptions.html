<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Needle — 50 Attention Interruption Mechanisms</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..600&family=Inter:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #F6F1EB;
      --bg-dark: #16161a;
      --surface: #FFFFFF;
      --ink: #1F1A14;
      --ink-2: #6B6259;
      --ink-3: #9A918A;
      --ink-4: #C5BDB5;
      --hairline: rgba(31,26,20,0.08);
      --hairline-2: rgba(31,26,20,0.14);
      --accent: #D4A847;
      --accent-soft: #FCF5E8;
      --urgent: #C4622D;
      --urgent-soft: #FBF0EA;
      --upcoming: #6F9272;
      --upcoming-soft: #EDF5EE;
      --calendar: #2C2C3A;
      --serif: 'Fraunces', Georgia, serif;
      --sans: 'Inter', -apple-system, sans-serif;
      --mono: 'Geist Mono', monospace;
      --ease: cubic-bezier(0.25, 1, 0.5, 1);
      --ease-bounce: cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; -webkit-font-smoothing: antialiased; }
    body {
      font-family: var(--sans);
      color: var(--ink);
      background: var(--bg);
      min-height: 100vh;
    }

    /* ══════════════════════════════════════
       CATALOG LAYOUT
       ══════════════════════════════════════ */

    .catalog-header {
      padding: 48px 32px 32px;
      text-align: center;
      border-bottom: 1px solid var(--hairline);
    }
    .catalog-title {
      font-family: var(--serif);
      font-size: 32px;
      font-weight: 400;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
    }
    .catalog-sub {
      font-size: 15px;
      color: var(--ink-2);
      max-width: 600px;
      margin: 0 auto 20px;
      line-height: 1.5;
    }
    .catalog-back {
      font-size: 13px;
      color: var(--ink-3);
      text-decoration: none;
    }
    .catalog-back:hover { color: var(--ink); }

    .category-nav {
      display: flex;
      gap: 4px;
      padding: 12px 32px;
      background: rgba(255,255,255,0.6);
      backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid var(--hairline);
      overflow-x: auto;
      scrollbar-width: none;
    }
    .category-nav::-webkit-scrollbar { display: none; }
    .cat-btn {
      flex-shrink: 0;
      padding: 6px 16px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 500;
      color: var(--ink-2);
      cursor: pointer;
      border: none;
      background: none;
      font-family: var(--sans);
      transition: all 0.15s ease;
      white-space: nowrap;
    }
    .cat-btn:hover { background: var(--surface); color: var(--ink); }
    .cat-btn.active { background: var(--ink); color: var(--bg); }

    .catalog-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
      padding: 24px 32px 100px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .mech-card {
      background: var(--surface);
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 1px 3px rgba(31,26,20,0.04);
      transition: all 0.2s var(--ease);
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }
    .mech-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
    }
    .mech-card[data-cat="visual"]::before { background: var(--urgent); }
    .mech-card[data-cat="character"]::before { background: var(--accent); }
    .mech-card[data-cat="physics"]::before { background: var(--upcoming); }
    .mech-card[data-cat="ambient"]::before { background: #6B7FA3; }
    .mech-card[data-cat="sound"]::before { background: #9B8EC4; }
    .mech-card[data-cat="gamified"]::before { background: var(--calendar); }

    .mech-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(31,26,20,0.08);
    }

    .mech-num {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--ink-4);
      margin-bottom: 8px;
    }
    .mech-name {
      font-family: var(--serif);
      font-size: 18px;
      font-weight: 400;
      margin-bottom: 6px;
      line-height: 1.25;
    }
    .mech-desc {
      font-size: 13px;
      color: var(--ink-2);
      line-height: 1.5;
      margin-bottom: 12px;
    }
    .mech-tags {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .mech-tag {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 999px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .mech-tag.low { background: var(--upcoming-soft); color: var(--upcoming); }
    .mech-tag.med { background: var(--accent-soft); color: var(--accent); }
    .mech-tag.high { background: var(--urgent-soft); color: var(--urgent); }
    .mech-tag.cat {
      background: rgba(31,26,20,0.05);
      color: var(--ink-3);
    }

    .try-btn {
      position: absolute;
      bottom: 16px;
      right: 16px;
      padding: 4px 12px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 600;
      background: var(--ink);
      color: var(--bg);
      opacity: 0;
      transform: translateY(4px);
      transition: all 0.2s var(--ease);
      cursor: pointer;
      border: none;
      font-family: var(--sans);
    }
    .mech-card:hover .try-btn { opacity: 1; transform: translateY(0); }

    /* ══════════════════════════════════════
       DEMO OVERLAY
       ══════════════════════════════════════ */

    .demo-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 1000;
    }
    .demo-overlay.active { display: block; }

    .demo-dismiss {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1100;
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .demo-btn {
      padding: 10px 24px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      font-family: var(--sans);
      transition: all 0.15s ease;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    }
    .demo-btn.primary {
      background: var(--surface);
      color: var(--ink);
    }
    .demo-btn.secondary {
      background: rgba(255,255,255,0.2);
      color: white;
      backdrop-filter: blur(8px);
    }
    .demo-btn:hover { transform: scale(1.04); }

    .demo-label {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1100;
      font-size: 12px;
      font-weight: 600;
      color: white;
      background: rgba(0,0,0,0.5);
      padding: 6px 16px;
      border-radius: 999px;
      backdrop-filter: blur(8px);
    }

    /* ══════════════════════════════════════
       INDIVIDUAL MECHANISM STYLES
       ══════════════════════════════════════ */

    /* 1. Torch / Flashlight */
    .torch-overlay {
      background: rgba(0,0,0,0.95);
      cursor: none;
    }
    .torch-spotlight {
      position: fixed;
      width: 200px;
      height: 200px;
      border-radius: 50%;
      pointer-events: none;
      background: radial-gradient(circle, rgba(255,255,255,0.9) 0%, rgba(255,255,255,0.4) 30%, transparent 70%);
      transform: translate(-50%, -50%);
      z-index: 1050;
      mix-blend-mode: screen;
    }
    .torch-message {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 1040;
      text-align: center;
      color: rgba(255,255,255,0.3);
      font-family: var(--serif);
      font-size: 28px;
      font-weight: 300;
      max-width: 400px;
      line-height: 1.3;
      pointer-events: none;
    }

    /* 2. Screen Frost */
    .frost-overlay {
      backdrop-filter: blur(0px);
      transition: backdrop-filter 3s ease;
      background: transparent;
    }
    .frost-overlay.active-anim {
      backdrop-filter: blur(12px);
    }
    .frost-center {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 1050;
      text-align: center;
      opacity: 0;
      transition: opacity 2s ease 1s;
    }
    .frost-overlay.active-anim .frost-center { opacity: 1; }
    .frost-icon { font-size: 48px; margin-bottom: 16px; }
    .frost-text {
      font-family: var(--serif);
      font-size: 24px;
      color: var(--ink);
      font-weight: 300;
    }
    .frost-sub {
      font-size: 14px;
      color: var(--ink-2);
      margin-top: 8px;
    }

    /* 3. Gravity Drop */
    .gravity-overlay {
      background: transparent;
      pointer-events: none;
    }
    .gravity-overlay .demo-dismiss { pointer-events: all; }
    .falling-char {
      position: fixed;
      font-size: 32px;
      z-index: 1050;
      animation: fall linear forwards;
      pointer-events: none;
    }
    @keyframes fall {
      0% { transform: translateY(-60px) rotate(0deg); opacity: 1; }
      70% { opacity: 1; }
      100% { transform: translateY(calc(100vh + 60px)) rotate(720deg); opacity: 0; }
    }

    /* 4. Vignette Pulse */
    .vignette-overlay {
      background: transparent;
      pointer-events: none;
      box-shadow: inset 0 0 100px 40px rgba(196, 98, 45, 0);
      animation: vigPulse 2s ease-in-out infinite;
    }
    .vignette-overlay .demo-dismiss { pointer-events: all; }
    @keyframes vigPulse {
      0%, 100% { box-shadow: inset 0 0 80px 20px rgba(196, 98, 45, 0.08); }
      50% { box-shadow: inset 0 0 120px 60px rgba(196, 98, 45, 0.18); }
    }
    .vig-banner {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      padding: 12px 24px;
      background: var(--urgent);
      color: white;
      text-align: center;
      font-size: 14px;
      font-weight: 500;
      z-index: 1050;
      animation: slideDown 0.4s var(--ease);
      pointer-events: all;
    }
    @keyframes slideDown {
      from { transform: translateY(-100%); }
      to { transform: translateY(0); }
    }

    /* 5. Kitty Visitor */
    .kitty-overlay {
      background: transparent;
      pointer-events: none;
    }
    .kitty-overlay .demo-dismiss { pointer-events: all; }
    .kitty {
      position: fixed;
      z-index: 1050;
      font-size: 48px;
      pointer-events: all;
      cursor: pointer;
      transition: transform 0.3s var(--ease-bounce);
    }
    .kitty:hover { transform: scale(1.2) rotate(-10deg) !important; }
    .kitty-speech {
      position: fixed;
      z-index: 1050;
      background: var(--surface);
      padding: 8px 16px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      font-size: 13px;
      font-weight: 500;
      color: var(--ink);
      pointer-events: none;
      white-space: nowrap;
    }
    .kitty-speech::after {
      content: '';
      position: absolute;
      bottom: -6px;
      left: 20px;
      width: 12px;
      height: 12px;
      background: var(--surface);
      transform: rotate(45deg);
      box-shadow: 2px 2px 4px rgba(0,0,0,0.05);
    }

    /* 6. Rain Effect */
    .rain-overlay {
      background: transparent;
      pointer-events: none;
    }
    .rain-overlay .demo-dismiss { pointer-events: all; }
    .raindrop {
      position: fixed;
      width: 2px;
      background: linear-gradient(to bottom, transparent, rgba(107, 146, 114, 0.4));
      z-index: 1050;
      animation: rainFall linear infinite;
      pointer-events: none;
    }
    @keyframes rainFall {
      0% { transform: translateY(-20px); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateY(100vh); opacity: 0; }
    }
    .rain-message {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 1060;
      text-align: center;
      color: var(--ink);
      pointer-events: all;
    }
    .rain-msg-text {
      font-family: var(--serif);
      font-size: 24px;
      font-weight: 300;
      background: rgba(255,255,255,0.8);
      backdrop-filter: blur(12px);
      padding: 24px 40px;
      border-radius: 16px;
    }

    /* 7. Breathing Circle */
    .breathe-overlay {
      background: rgba(0,0,0,0.7);
    }
    .breathe-circle {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 160px;
      height: 160px;
      border-radius: 50%;
      background: radial-gradient(circle, var(--accent) 0%, transparent 70%);
      z-index: 1050;
      animation: breatheAnim 6s ease-in-out infinite;
    }
    @keyframes breatheAnim {
      0%, 100% { transform: translate(-50%, -50%) scale(0.6); opacity: 0.4; }
      50% { transform: translate(-50%, -50%) scale(1.4); opacity: 0.8; }
    }
    .breathe-text {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 1060;
      font-family: var(--serif);
      font-size: 20px;
      color: white;
      text-align: center;
      animation: breatheTextAnim 6s ease-in-out infinite;
    }
    @keyframes breatheTextAnim {
      0%, 45% { content: 'Breathe in...'; opacity: 1; }
      50%, 95% { opacity: 0.5; }
      100% { opacity: 1; }
    }
    .breathe-sub {
      position: fixed;
      top: calc(50% + 100px);
      left: 50%;
      transform: translateX(-50%);
      z-index: 1060;
      font-size: 14px;
      color: rgba(255,255,255,0.6);
      text-align: center;
    }

    /* 8. Color Drain */
    .drain-filter {
      position: fixed;
      inset: 0;
      z-index: 1000;
      pointer-events: none;
      backdrop-filter: saturate(100%);
      transition: backdrop-filter 4s ease;
    }
    .drain-filter.active-anim {
      backdrop-filter: saturate(0%) brightness(0.9);
    }

    /* 9. Floating Bubble */
    .bubble {
      position: fixed;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, rgba(212,168,71,0.15), rgba(212,168,71,0.05));
      border: 1px solid rgba(212,168,71,0.2);
      z-index: 1050;
      pointer-events: all;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: float 4s ease-in-out infinite;
      transition: transform 0.3s var(--ease-bounce);
    }
    .bubble:hover { transform: scale(1.1); }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
    }
    .bubble-inner {
      text-align: center;
      pointer-events: none;
    }
    .bubble-icon { font-size: 24px; }
    .bubble-text { font-size: 11px; font-weight: 600; color: var(--ink-2); margin-top: 4px; }

    /* 10. Screen Shake */
    @keyframes screenShake {
      0%, 100% { transform: translate(0); }
      10% { transform: translate(-2px, 1px); }
      20% { transform: translate(2px, -1px); }
      30% { transform: translate(-1px, 2px); }
      40% { transform: translate(1px, -1px); }
      50% { transform: translate(-1px, 1px); }
      60% { transform: translate(2px, 0); }
      70% { transform: translate(-2px, 1px); }
      80% { transform: translate(1px, -2px); }
      90% { transform: translate(-1px, 0); }
    }

    /* 11. Countdown Timer Bar */
    .timer-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      z-index: 1100;
      background: var(--urgent);
      transform-origin: left;
      animation: timerShrink 30s linear forwards;
    }
    @keyframes timerShrink {
      from { transform: scaleX(1); }
      to { transform: scaleX(0); }
    }

    /* 12. Particle Swarm */
    .particle {
      position: fixed;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      z-index: 1050;
      pointer-events: none;
      opacity: 0.6;
    }

    /* 13. Wave Effect */
    .wave-overlay {
      background: transparent;
      pointer-events: none;
    }
    .wave-overlay .demo-dismiss { pointer-events: all; }
    .wave-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 1050;
      pointer-events: none;
    }
    .wave-bar svg {
      width: 100%;
      display: block;
    }

    /* 14. Progress Ring */
    .progress-ring-container {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 1050;
    }
    .progress-ring-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
    }
    .ring-time { font-family: var(--serif); font-size: 32px; color: white; }
    .ring-label { font-size: 12px; color: rgba(255,255,255,0.6); margin-top: 4px; }

    /* 15. Emoji March */
    .marcher {
      position: fixed;
      font-size: 28px;
      z-index: 1050;
      pointer-events: none;
      animation: march linear forwards;
    }
    @keyframes march {
      0% { transform: translateX(-60px); }
      100% { transform: translateX(calc(100vw + 60px)); }
    }

    /* Notification Toast */
    .notif-toast {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 1100;
      background: var(--surface);
      border-radius: 12px;
      padding: 16px 20px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.12);
      display: flex;
      align-items: center;
      gap: 12px;
      max-width: 340px;
      animation: toastIn 0.4s var(--ease);
      pointer-events: all;
    }
    @keyframes toastIn {
      from { transform: translateX(120%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    .notif-icon { font-size: 24px; flex-shrink: 0; }
    .notif-content {}
    .notif-title { font-size: 13px; font-weight: 600; color: var(--ink); }
    .notif-body { font-size: 12px; color: var(--ink-2); margin-top: 2px; }

    /* Island banner (Dynamic Island style) */
    .island-banner {
      position: fixed;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1100;
      background: var(--ink);
      color: white;
      border-radius: 24px;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      animation: islandExpand 0.5s var(--ease-bounce);
      pointer-events: all;
      cursor: pointer;
    }
    @keyframes islandExpand {
      0% { transform: translateX(-50%) scaleX(0.3); opacity: 0; border-radius: 50px; }
      100% { transform: translateX(-50%) scaleX(1); opacity: 1; border-radius: 24px; }
    }
    .island-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--urgent);
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(1.3); }
    }
    .island-text { font-size: 13px; font-weight: 500; }
    .island-time { font-size: 11px; opacity: 0.6; font-family: var(--mono); }

    /* Split reveal */
    .split-overlay {
      display: flex;
    }
    .split-half {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.8s var(--ease);
    }
    .split-left {
      background: var(--ink);
      color: white;
      transform: translateX(-100%);
    }
    .split-right {
      background: var(--accent);
      color: var(--ink);
      transform: translateX(100%);
    }
    .split-overlay.active-anim .split-left,
    .split-overlay.active-anim .split-right {
      transform: translateX(0);
    }
    .split-content {
      text-align: center;
      padding: 32px;
    }
    .split-content h2 {
      font-family: var(--serif);
      font-size: 28px;
      font-weight: 300;
      margin-bottom: 8px;
    }
    .split-content p { font-size: 14px; opacity: 0.7; }

    /* Spotlight search */
    .spotlight-overlay {
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(8px);
    }
    .spotlight-box {
      position: fixed;
      top: 30%;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1050;
      width: 480px;
      background: var(--surface);
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
      padding: 24px;
      animation: spotlightIn 0.3s var(--ease);
    }
    @keyframes spotlightIn {
      from { transform: translateX(-50%) scale(0.95) translateY(-10px); opacity: 0; }
      to { transform: translateX(-50%) scale(1) translateY(0); opacity: 1; }
    }
    .spotlight-prompt {
      font-family: var(--serif);
      font-size: 20px;
      font-weight: 300;
      color: var(--ink);
      margin-bottom: 16px;
      line-height: 1.3;
    }
    .spotlight-options {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .spotlight-opt {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border-radius: 8px;
      background: var(--bg);
      cursor: pointer;
      transition: all 0.15s ease;
      border: none;
      font-family: var(--sans);

@keyframes rippleHintPulse {

/* ══════════════════════════════════════

   ══════════════════════════════════════ */

/* ══════════════════════════════════════
   #30: BLACK HOLE
   ══════════════════════════════════════ */
.blackhole-overlay {
  background: transparent;
  pointer-events: none;
}
.blackhole-overlay .demo-dismiss { pointer-events: all; }


/* ══════════════════════════════════════
   #31 SUNSET GRADIENT
   ══════════════════════════════════════ */
.sunset-overlay {
  background: linear-gradient(to bottom, #FFB347 0%, #FF7043 40%, #8B4F8B 80%, #2E1760 100%);
  animation: sunsetCycle 6s ease-in-out infinite;
}
@keyframes sunsetCycle {
  0%   { background: linear-gradient(to bottom, #FFD580 0%, #FFB347 30%, #FF7043 65%, #C2185B 90%, #4A148C 100%); }
  25%  { background: linear-gradient(to bottom, #FF8A65 0%, #FF5722 35%, #AD1457 65%, #4A148C 90%, #1A0030 100%); }
  50%  { background: linear-gradient(to bottom, #FF6F61 0%, #D84315 30%, #880E4F 60%, #1A0030 85%, #050510 100%); }
  75%  { background: linear-gradient(to bottom, #7B1FA2 0%, #4A148C 30%, #1A0030 60%, #050510 85%, #000008 100%); }
  100% { background: linear-gradient(to bottom, #FFD580 0%, #FFB347 30%, #FF7043 65%, #C2185B 90%, #4A148C 100%); }
}
.sunset-stars {
  position: fixed;
  inset: 0;
  z-index: 1;
  pointer-events: none;
}
.sunset-star {
  position: absolute;
  width: 2px;
  height: 2px;
  border-radius: 50%;
  background: white;
  animation: starTwinkle ease-in-out infinite;
}
@keyframes starTwinkle {
  0%, 100% { opacity: 0; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.4); }
}
.sunset-horizon {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: 120px;
  z-index: 2;
  pointer-events: none;
}
.sunset-message {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 10;
  text-align: center;
  animation: sunsetMsgFade 3s ease forwards;
}
@keyframes sunsetMsgFade {
  from { opacity: 0; transform: translate(-50%, -48%); }
  to   { opacity: 1; transform: translate(-50%, -50%); }
}
.sunset-msg-title {
  font-family: var(--serif);
  font-size: 36px;
  font-weight: 300;
  color: rgba(255,255,255,0.95);
  text-shadow: 0 2px 20px rgba(0,0,0,0.4);
  margin-bottom: 12px;
  letter-spacing: -0.01em;
}
.sunset-msg-sub {
  font-size: 15px;
  color: rgba(255,255,255,0.75);
  text-shadow: 0 1px 8px rgba(0,0,0,0.4);
}

/* ══════════════════════════════════════
   #34 FOG ROLL
   ══════════════════════════════════════ */
.fog-overlay {
  background: rgba(240, 235, 228, 0.15);
  pointer-events: none;
}
.fog-overlay .demo-dismiss { pointer-events: all; }
.fog-layer {
  position: fixed;
  left: -20%;
  right: -20%;
  border-radius: 50%;
  background: radial-gradient(ellipse at center bottom, rgba(255,255,255,0.82) 0%, rgba(255,255,255,0.45) 50%, transparent 75%);
  pointer-events: none;
  animation: fogRise linear forwards;
}
@keyframes fogRise {
  from { transform: translateY(0); opacity: 0; }
  10%  { opacity: 1; }
  90%  { opacity: 1; }
  to   { transform: translateY(-60vh); opacity: 0.6; }
}
.fog-message {
  position: fixed;
  top: 28%;
  left: 50%;
  transform: translateX(-50%);
  z-index: 1060;
  text-align: center;
  pointer-events: all;
  animation: fogMsgRise 1.5s 1.2s var(--ease) both;
}
@keyframes fogMsgRise {
  from { opacity: 0; transform: translateX(-50%) translateY(16px); }
  to   { opacity: 1; transform: translateX(-50%) translateY(0); }
}
.fog-msg-inner {
  font-family: var(--serif);
  font-size: 26px;
  font-weight: 300;
  color: var(--ink);
  text-shadow: 0 0 30px rgba(255,255,255,0.9);
  line-height: 1.4;
  padding: 20px 36px;
}
.fog-msg-sub {
  font-size: 14px;
  color: var(--ink-2);
  margin-top: 8px;
  font-style: italic;
}

/* ══════════════════════════════════════
   #36 NORTHERN LIGHTS
   ══════════════════════════════════════ */
.aurora-overlay {
  background: #03080F;
}
.aurora-canvas {
  position: fixed;
  inset: 0;
  z-index: 1;
}
.aurora-message {
  position: fixed;
  bottom: 120px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 10;
  text-align: center;
  pointer-events: all;
  animation: auroraFadeIn 2s 0.5s ease both;
}
@keyframes auroraFadeIn {
  from { opacity: 0; transform: translateX(-50%) translateY(12px); }
  to   { opacity: 1; transform: translateX(-50%) translateY(0); }
}
.aurora-msg-title {
  font-family: var(--serif);
  font-size: 28px;
  font-weight: 300;
  color: rgba(255,255,255,0.9);
  text-shadow: 0 0 20px rgba(100,255,200,0.5);
  margin-bottom: 8px;
}
.aurora-msg-sub {
  font-size: 14px;
  color: rgba(255,255,255,0.5);
}

/* ══════════════════════════════════════
   #37 TIDE RISING
   ══════════════════════════════════════ */
.tide-overlay {
  background: linear-gradient(to bottom, #87CEEB 0%, #B0E0FF 60%, #E8F4FF 100%);
}
.tide-canvas {
  position: fixed;
  inset: 0;
  z-index: 1;
}
.tide-buoy {
  position: fixed;
  font-size: 36px;
  z-index: 10;
  pointer-events: none;
  filter: drop-shadow(0 4px 8px rgba(0,0,0,0.2));
  transition: bottom 0.3s ease;
}
.tide-message {
  position: fixed;
  top: 20%;
  left: 50%;
  transform: translateX(-50%);
  z-index: 10;
  text-align: center;
  pointer-events: all;
  animation: tideMsgIn 1s 0.8s var(--ease) both;
}
@keyframes tideMsgIn {
  from { opacity: 0; transform: translateX(-50%) scale(0.95); }
  to   { opacity: 1; transform: translateX(-50%) scale(1); }
}
.tide-msg-card {
  background: rgba(255,255,255,0.85);
  backdrop-filter: blur(12px);
  padding: 24px 40px;
  border-radius: 20px;
  box-shadow: 0 8px 40px rgba(0,80,160,0.15);
}
.tide-msg-title {
  font-family: var(--serif);
  font-size: 26px;
  font-weight: 300;
  color: var(--ink);
  margin-bottom: 8px;
}
.tide-msg-sub {
  font-size: 14px;
  color: var(--ink-2);
}

/* ══════════════════════════════════════
   #38 DAY/NIGHT CYCLE
   ══════════════════════════════════════ */
.daynight-overlay {
  animation: dayNightCycle 14s linear infinite;
}
@keyframes dayNightCycle {
  0%   { background: linear-gradient(to bottom, #87CEEB 0%, #B0D8F0 60%, #D4EAF7 100%); }
  20%  { background: linear-gradient(to bottom, #6BB8D9 0%, #8ECFEC 60%, #B8E2F5 100%); }
  35%  { background: linear-gradient(to bottom, #FF8C42 0%, #FFB366 40%, #FFD580 70%, #8B4F8B 100%); }
  50%  { background: linear-gradient(to bottom, #1a1a2e 0%, #16213e 40%, #0f3460 70%, #533483 100%); }
  65%  { background: linear-gradient(to bottom, #0d0d1a 0%, #1a1a35 40%, #2d2b6b 70%, #4a3f8a 100%); }
  80%  { background: linear-gradient(to bottom, #FF6B6B 0%, #FFA94D 40%, #FFD580 70%, #B8D9F5 100%); }
  100% { background: linear-gradient(to bottom, #87CEEB 0%, #B0D8F0 60%, #D4EAF7 100%); }
}
.daynight-sky {
  position: fixed;
  inset: 0;
  z-index: 1;
  overflow: hidden;
  pointer-events: none;
}
.daynight-sun {
  position: absolute;
  font-size: 52px;
  filter: drop-shadow(0 0 20px rgba(255,200,0,0.6));
  transition: none;
}
.daynight-moon {
  position: absolute;
  font-size: 44px;
  filter: drop-shadow(0 0 15px rgba(200,220,255,0.5));
  transition: none;
}
.daynight-stars-layer {
  position: absolute;
  inset: 0;
}
.daynight-star {
  position: absolute;
  width: 3px;
  height: 3px;
  border-radius: 50%;
  background: white;
  animation: dnTwinkle ease-in-out infinite;
}
@keyframes dnTwinkle {
  0%, 100% { opacity: 0.2; }
  50% { opacity: 1; }
}
.daynight-ground {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: 80px;
  z-index: 2;
  pointer-events: none;
}
.daynight-message {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 10;
  text-align: center;
  pointer-events: all;
}
.daynight-msg-card {
  background: rgba(255,255,255,0.2);
  backdrop-filter: blur(16px);
  border: 1px solid rgba(255,255,255,0.3);
  padding: 28px 48px;
  border-radius: 20px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.2);
}
.daynight-msg-title {
  font-family: var(--serif);
  font-size: 28px;
  font-weight: 300;
  color: white;
  text-shadow: 0 2px 12px rgba(0,0,0,0.4);
  margin-bottom: 8px;
}
.daynight-msg-sub {
  font-size: 14px;
  color: rgba(255,255,255,0.75);
  text-shadow: 0 1px 6px rgba(0,0,0,0.3);
}
.daynight-phase-label {
  position: fixed;
  bottom: 100px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 10;
  font-size: 12px;
  font-family: var(--mono);
  color: rgba(255,255,255,0.5);
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

/* ══════════════════════════════════════
   #40 SEASONAL SHIFT
   ══════════════════════════════════════ */
.seasonal-overlay {
  pointer-events: none;
  transition: background 3s ease;
}
.seasonal-overlay .demo-dismiss { pointer-events: all; }
.seasonal-particles-layer {
  position: fixed;
  inset: 0;
  z-index: 1;
  pointer-events: none;
  overflow: hidden;
}
.seasonal-leaf {
  position: absolute;
  font-size: 20px;
  animation: leafFall linear forwards;
  pointer-events: none;
}
@keyframes leafFall {
  0%   { transform: translateY(-40px) rotate(0deg) translateX(0); opacity: 1; }
  25%  { transform: translateY(25vh) rotate(90deg) translateX(30px); }
  50%  { transform: translateY(50vh) rotate(180deg) translateX(-20px); opacity: 1; }
  75%  { transform: translateY(75vh) rotate(270deg) translateX(25px); }
  100% { transform: translateY(110vh) rotate(360deg) translateX(0); opacity: 0; }
}
.seasonal-snowflake {
  position: absolute;
  color: white;
  animation: snowDrift linear forwards;
  pointer-events: none;
  text-shadow: 0 0 4px rgba(180,220,255,0.8);
}
@keyframes snowDrift {
  0%   { transform: translateY(-20px) rotate(0deg) translateX(0); opacity: 0; }
  10%  { opacity: 1; }
  80%  { opacity: 0.9; }
  100% { transform: translateY(110vh) rotate(180deg) translateX(40px); opacity: 0; }
}
.seasonal-message {
  position: fixed;
  top: 38%;
  left: 50%;
  transform: translateX(-50%);
  z-index: 10;
  text-align: center;
  pointer-events: all;
  width: max-content;
  max-width: min(90vw, 400px);
}
.seasonal-msg-card {
  background: rgba(255,255,255,0.82);
  backdrop-filter: blur(16px);
  padding: 24px 40px;
  border-radius: 20px;
  box-shadow: 0 8px 40px rgba(0,0,0,0.12);
  transition: background 1.5s ease;
}
.seasonal-msg-title {
  font-family: var(--serif);
  font-size: 26px;
  font-weight: 300;
  color: var(--ink);
  margin-bottom: 8px;
  transition: color 1.5s ease;
}
.seasonal-msg-sub {
  font-size: 14px;
  color: var(--ink-2);
}
.seasonal-season-badge {
  display: inline-block;
  margin-bottom: 12px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 3px 12px;
  border-radius: 999px;
  background: rgba(212,168,71,0.15);
  color: var(--ink-3);
  transition: all 1.5s ease;
}


/* ══════════════════════════════════════
   #41 WIND CHIMES
   ══════════════════════════════════════ */
.chimes-overlay {
  background: radial-gradient(ellipse at 50% 0%, rgba(180,210,240,0.25) 0%, rgba(10,20,40,0.92) 60%);
}
.chimes-bar {
  position: absolute;
  bottom: 0;
  left: 50%;
  transform-origin: top center;
  border-radius: 3px 3px 6px 6px;
  background: linear-gradient(180deg, #d8e8f5 0%, #a0bcd4 40%, #7fa8c8 70%, #c8dce8 100%);
  box-shadow: inset -2px 0 4px rgba(255,255,255,0.3), inset 2px 0 3px rgba(0,0,0,0.15), 0 2px 8px rgba(0,0,0,0.3);
  cursor: default;
}
.chimes-string {
  position: absolute;
  top: 0; left: 50%;
  transform: translateX(-50%);
  width: 1px;
  background: linear-gradient(to bottom, rgba(255,255,255,0.6), rgba(255,255,255,0.15));
}
.chimes-ripple {
  position: absolute;
  border-radius: 50%;
  border: 2px solid rgba(160,200,240,0.7);
  transform: translate(-50%, -50%) scale(0);
  pointer-events: none;
  animation: chimeRipple 1.4s var(--ease) forwards;
}
@keyframes chimeRipple {
  0%   { transform: translate(-50%,-50%) scale(0); opacity: 0.9; }
  100% { transform: translate(-50%,-50%) scale(1); opacity: 0; }
}
@keyframes chimeSway {
  0%   { transform: rotate(0deg); }
  25%  { transform: rotate(8deg); }
  75%  { transform: rotate(-6deg); }
  100% { transform: rotate(0deg); }
}
.chimes-label {
  position: absolute;
  top: 80px; left: 50%;
  transform: translateX(-50%);
  font-family: var(--serif);
  font-size: 22px;
  font-weight: 300;
  color: rgba(200,225,255,0.85);
  text-align: center;
  letter-spacing: 0.03em;
  text-shadow: 0 2px 12px rgba(0,0,0,0.5);
  white-space: nowrap;
}
.chimes-sub {
  position: absolute;
  top: 116px; left: 50%;
  transform: translateX(-50%);
  font-size: 13px;
  color: rgba(160,200,240,0.65);
  white-space: nowrap;
}

/* ══════════════════════════════════════
   #42 HEARTBEAT / EKG
   ══════════════════════════════════════ */
.ekg-overlay {
  background: #0a1a0f;
}
.ekg-bpm {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, calc(-50% - 80px));
  z-index: 1060;
  text-align: center;

}
.ekg-bpm-num {
  font-family: var(--mono);
  font-size: 64px;
  font-weight: 500;
  color: #00e87a;
  line-height: 1;
  transition: color 3s ease;
  text-shadow: 0 0 30px rgba(0,232,122,0.5);
}
.ekg-bpm-label {
  font-family: var(--mono);
  font-size: 12px;
  letter-spacing: 0.2em;
  color: rgba(0,232,122,0.5);
  margin-top: 4px;
}
.ekg-message {
  position: fixed;

  left: 50%;
  transform: translateX(-50%);
  z-index: 1060;
  font-family: var(--serif);
  font-size: 18px;
  font-weight: 300;
  color: rgba(0,232,122,0.7);
  white-space: nowrap;
  pointer-events: none;
}

/* ══════════════════════════════════════
   #43 SPATIAL WHISPER
   ══════════════════════════════════════ */
.whisper-overlay {
  background: #0f0d12;
}
.whisper-phrase {
  position: fixed;
  top: 50%;
  font-family: var(--serif);
  font-weight: 300;
  color: white;
  pointer-events: none;
  transition: opacity 0.8s ease, filter 0.8s ease, transform 0.8s var(--ease);
}
.whisper-phrase.left {
  left: 8%;
  transform: translateY(-50%);
  font-size: 42px;
  opacity: 0;
  filter: blur(12px);
}
.whisper-phrase.right {
  right: 8%;
  transform: translateY(-50%);
  font-size: 38px;
  opacity: 0;
  filter: blur(12px);
  text-align: right;
}
.whisper-phrase.center {
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 34px;
  opacity: 0;
  filter: blur(4px);
  text-align: center;
  color: rgba(255,255,255,0.95);
  white-space: nowrap;
}
.whisper-phrase.visible {
  opacity: 0.55;
  filter: blur(6px);
}
.whisper-phrase.sharp {
  opacity: 1;
  filter: blur(0px);
}
.whisper-particles {
  position: fixed;
  inset: 0;
  z-index: 1049;
  pointer-events: none;
}

/* ══════════════════════════════════════
   #44 NATURE TRANSITION
   ══════════════════════════════════════ */
.nature-overlay {
  display: flex;
  overflow: hidden;
}
.nature-half {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 16px;
  position: relative;
  overflow: hidden;
  transition: flex 5s cubic-bezier(0.4,0,0.2,1);
}
.nature-forest {
  background: linear-gradient(160deg, #1a3a1a 0%, #2d5a2d 30%, #3d7a3d 60%, #2a6a2a 100%);
}
.nature-urban {
  background: linear-gradient(160deg, #2a2a3a 0%, #3a3a4a 30%, #4a4a5a 60%, #35354a 100%);
}
.nature-emoji-row {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  justify-content: center;
  font-size: 36px;
  z-index: 1;
}
.nature-label {
  font-family: var(--serif);
  font-size: 16px;
  font-weight: 300;
  color: rgba(255,255,255,0.75);
  letter-spacing: 0.05em;
  text-transform: uppercase;
  z-index: 1;
}
.nature-divider {
  position: absolute;
  top: 0; bottom: 0;
  width: 4px;
  background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.7) 20%, rgba(255,255,255,0.9) 50%, rgba(255,255,255,0.7) 80%, transparent);
  z-index: 1060;
  pointer-events: none;
  box-shadow: 0 0 16px 4px rgba(255,255,255,0.25);
  transition: left 5s cubic-bezier(0.4,0,0.2,1);
}
.nature-caption {
  position: fixed;
  bottom: 140px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 1065;
  font-family: var(--serif);
  font-size: 18px;
  color: rgba(255,255,255,0.8);
  text-align: center;
  pointer-events: none;
  text-shadow: 0 2px 12px rgba(0,0,0,0.6);
  white-space: nowrap;
}
@keyframes leafFloat {
  0%   { transform: translateY(0) rotate(0deg); opacity:0.8; }
  50%  { transform: translateY(-18px) rotate(25deg); opacity:1; }
  100% { transform: translateY(0) rotate(0deg); opacity:0.8; }
}
.nature-forest-particle {
  position: absolute;
  font-size: 18px;
  animation: leafFloat linear infinite;
  pointer-events: none;
}

/* ══════════════════════════════════════
   #45 MUSICAL COUNTDOWN
   ══════════════════════════════════════ */
.music-overlay {
  background: linear-gradient(135deg, #1a0a2e 0%, #16213e 50%, #0f3460 100%);
}

  position: fixed;

      { id:1, cat:'visual', name:'The Torch', desc:'Screen goes dark. A flashlight follows your cursor, revealing a message underneath: "Time to switch — your 3:00 PM meeting starts in 5 min."', complexity:'medium', escalation:'Circle shrinks over time until only a tiny pinhole of light remains.' },

      { id:4, cat:'visual', name:'Color Drain', desc:'Screen slowly loses color saturation over 30 seconds, going fully grayscale. The only color remaining is the transition CTA button.', complexity:'low', escalation:'After grayscale: brightness dims. The CTA button glows brighter.' },

      { id:11, cat:'character', name:'The Kitty', desc:'A curious cat emoji walks in from the side of the screen, sits down, and looks up at you with a speech bubble: "Hey, don\'t you have somewhere to be? 🐱"', complexity:'medium', escalation:'Cat starts batting at your cursor. Then brings friends. Then naps on your work.' },

    function demoParticles(content, overlay) {
      overlay.style.background = 'rgba(0,0,0,0.3)';
      const particles = [];
      const canvas = document.createElement('canvas');
      canvas.style.cssText = 'position:fixed;inset:0;z-index:1050;pointer-events:none;';
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      content.appendChild(canvas);
      const ctx = canvas.getContext('2d');
      
      let mouseX = window.innerWidth/2, mouseY = window.innerHeight/2;
      document.addEventListener('mousemove', (e) => { mouseX = e.clientX; mouseY = e.clientY; });
      
      for (let i = 0; i < 60; i++) {
        particles.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
          vx: 0, vy: 0,
          size: 2 + Math.random() * 3,
          color: `hsla(${40 + Math.random()*20}, 70%, 60%, 0.7)`
        });
      }
      
      let animId;
      function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        particles.forEach(p => {
          const dx = mouseX - p.x, dy = mouseY - p.y;
          const dist = Math.sqrt(dx*dx + dy*dy);
          const force = Math.min(3, 200 / (dist + 1));
          p.vx += (dx / dist) * force * 0.02;
          p.vy += (dy / dist) * force * 0.02;
          p.vx *= 0.96; p.vy *= 0.96;
          p.x += p.vx; p.y += p.vy;
          
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
          ctx.fillStyle = p.color;
          ctx.fill();
        });
        animId = requestAnimationFrame(animate);
      }
      animate();
      demoCleanup = () => { cancelAnimationFrame(animId); };
    }

function demoSpotlightSweep(content, overlay) {
  overlay.style.background = 'rgba(0,0,0,0.88)';

  const canvas = document.createElement('canvas');
  canvas.className = 'sweep-canvas';
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  content.appendChild(canvas);
  const ctx = canvas.getContext('2d');

  const msg = document.createElement('div');
  msg.className = 'sweep-message';
  msg.innerHTML = 'Time to switch.<br><span class="sweep-sub">Manager 1:1 starts in 5 minutes</span>';
  content.appendChild(msg);

  // Spotlight parameters
  const W = canvas.width;
  const H = canvas.height;
  const R = Math.min(W, H) * 0.22;   // spotlight radius
  let t = 0;
  let animId;
  let revealed = false;

  function draw() {
    ctx.clearRect(0, 0, W, H);

    // Sweep position: horizontal travel with a sine-wave vertical path
    const progress = (t % 1);
    const cx = progress * (W + R * 2) - R;
    const cy = H * 0.5 + Math.sin(t * Math.PI * 2) * H * 0.22;

    // Dark mask with spotlight cutout
    ctx.save();

    // Fill dark background
    ctx.fillStyle = 'rgba(0,0,0,0.0)';   // base is overlay bg already
    ctx.fillRect(0, 0, W, H);

    // Spotlight glow — outer halo
    const halo = ctx.createRadialGradient(cx, cy, R * 0.5, cx, cy, R * 1.8);
    halo.addColorStop(0, 'rgba(255,245,200,0.18)');
    halo.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = halo;
    ctx.fillRect(0, 0, W, H);

    // Spotlight bright core (blend mode: screen on dark overlay reveals content)
    const spot = ctx.createRadialGradient(cx, cy, 0, cx, cy, R);
    spot.addColorStop(0,   'rgba(255,252,230,0.92)');
    spot.addColorStop(0.35,'rgba(255,245,200,0.72)');
    spot.addColorStop(0.70,'rgba(255,235,150,0.30)');
    spot.addColorStop(1,   'rgba(0,0,0,0)');
    ctx.fillStyle = spot;
    ctx.globalCompositeOperation = 'screen';
    ctx.fillRect(0, 0, W, H);

    ctx.restore();

    // Advance time — one sweep every ~4 seconds
    t += 0.004;

    // Show the message card once the spotlight has swept past center once
    if (!revealed && t > 0.32) {
      revealed = true;
      msg.classList.add('visible');
    }

    animId = requestAnimationFrame(draw);
  }

  draw();

  demoCleanup = () => {
    cancelAnimationFrame(animId);
    overlay.style.background = '';
  };
}

function demoPixelDissolve(content, overlay) {
  overlay.style.background = 'transparent';
  overlay.style.pointerEvents = 'none';
  document.querySelector('.demo-dismiss').style.pointerEvents = 'all';

  const canvas = document.createElement('canvas');
  canvas.className = 'dissolve-canvas';
  const W = window.innerWidth;
  const H = window.innerHeight;
  canvas.width = W;
  canvas.height = H;
  content.appendChild(canvas);
  const ctx = canvas.getContext('2d');

  const msg = document.createElement('div');
  msg.className = 'dissolve-message';
  msg.innerHTML = `<div class="dissolve-msg-inner">Time to move on.<br><span class="dissolve-msg-sub">Manager 1:1 in 5 minutes</span></div>`;
  content.appendChild(msg);

  // Pixel grid config
  const PIXEL = 14;          // pixel square size
  const cols = Math.ceil(W / PIXEL);
  const rows = Math.ceil(H / PIXEL);
  const total = cols * rows;

  // Warm palette: accent/urgent/upcoming tones
  const palette = [
    '#D4A847', '#C4622D', '#6F9272',
    '#E8C87A', '#F0A060', '#A8C4AA',
    '#D48030', '#8B5E3C', '#7A9E7E',
    '#EAD4A0', '#C8845C', '#B0CC90',
  ];

  // Build pixel list sorted by distance from edges (edges first, center last)
  const cx = cols / 2, cy = rows / 2;
  const pixels = [];
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      // Distance from nearest edge (0 = at edge)
      const edgeDist = Math.min(c, cols - 1 - c, r, rows - 1 - r);
      pixels.push({ c, r, edgeDist, color: palette[Math.floor(Math.random() * palette.length)], alpha: 0 });
    }
  }
  // Sort: smallest edgeDist first (edges come in first)
  pixels.sort((a, b) => a.edgeDist - b.edgeDist);

  // The maximum edge distance determines how we map progress → reveal wave
  const maxEdgeDist = Math.min(Math.floor(cols / 2), Math.floor(rows / 2));

  let startTime = null;
  const DURATION = 3200;  // ms for full coverage
  let revealed = false;
  let animId;

  function draw(ts) {
    if (!startTime) startTime = ts;
    const elapsed = ts - startTime;
    const progress = Math.min(1, elapsed / DURATION);

    ctx.clearRect(0, 0, W, H);

    // The wave front: pixels with edgeDist <= currentEdgeFront are drawn
    // We map progress linearly across edgeDist range
    const currentEdgeFront = progress * maxEdgeDist;

    pixels.forEach(p => {
      if (p.edgeDist <= currentEdgeFront) {
        // Fade in each pixel based on how far past its threshold we are
        const localProgress = Math.min(1, (currentEdgeFront - p.edgeDist) * 2.5);
        p.alpha = localProgress;

        ctx.globalAlpha = p.alpha * 0.85;
        ctx.fillStyle = p.color;
        const gap = 2;
        ctx.fillRect(p.c * PIXEL + gap, p.r * PIXEL + gap, PIXEL - gap * 2, PIXEL - gap * 2);
      }
    });

    ctx.globalAlpha = 1;

    // Show message when ~50% covered (pixels halfway in from edges)
    if (!revealed && progress >= 0.48) {
      revealed = true;
      msg.classList.add('visible');
    }

    if (progress < 1) {
      animId = requestAnimationFrame(draw);
    } else {
      animId = requestAnimationFrame(draw);  // keep animating to hold state
    }
  }

  animId = requestAnimationFrame(draw);

  demoCleanup = () => {
    cancelAnimationFrame(animId);
    overlay.style.background = '';
    overlay.style.pointerEvents = '';
  };
}

    function demoDuckling(content, overlay) {
      overlay.classList.add('duck-overlay');

      const canvas = document.createElement('canvas');
      canvas.className = 'duck-canvas';
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      content.appendChild(canvas);
      const ctx = canvas.getContext('2d');

      const TRAIL_LEN = 320;
      const DUCK_SPACING = 38;
      const NUM_DUCKS = 6;
      const trail = [];
      for (let i = 0; i < TRAIL_LEN; i++) {
        trail.push({ x: window.innerWidth / 2, y: window.innerHeight / 2 });
      }

      let mouseX = window.innerWidth / 2;
      let mouseY = window.innerHeight / 2;
      let headX = mouseX, headY = mouseY;
      let trailHead = 0;

      const mamaSign = document.createElement('div');
      mamaSign.className = 'duck-mama-sign';
      mamaSign.textContent = '🗓 Meeting in 5 min!';
      content.appendChild(mamaSign);

      const onMove = (e) => { mouseX = e.clientX; mouseY = e.clientY; };
      document.addEventListener('mousemove', onMove);

      let animId;
      let showSign = false;

      function tick() {
        // Smoothly interpolate head toward mouse
        headX += (mouseX - headX) * 0.15;
        headY += (mouseY - headY) * 0.15;

        // Push head into ring buffer
        trail[trailHead] = { x: headX, y: headY };
        trailHead = (trailHead + 1) % TRAIL_LEN;

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Draw mama duck at head position
        ctx.font = '32px serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.save();
        // Angle toward movement direction
        const prev = trail[(trailHead - 2 + TRAIL_LEN) % TRAIL_LEN];
        const angle = Math.atan2(headY - prev.y, headX - prev.x);
        ctx.translate(headX, headY);
        ctx.rotate(angle);
        ctx.scale(headX < prev.x ? -1 : 1, 1);
        ctx.fillText('🦆', 0, 0);
        ctx.restore();

        // Update mama sign position
        mamaSign.style.left = headX + 'px';
        mamaSign.style.top = headY + 'px';
        if (!showSign) {
          showSign = true;
          mamaSign.style.opacity = '1';
        }

        // Draw ducklings trailing behind
        for (let d = 0; d < NUM_DUCKS; d++) {
          const bufIdx = (trailHead - 1 - (d + 1) * DUCK_SPACING + TRAIL_LEN * 2) % TRAIL_LEN;
          const pos = trail[bufIdx];
          const prevPos = trail[(bufIdx - 2 + TRAIL_LEN) % TRAIL_LEN];
          const dAngle = Math.atan2(pos.y - prevPos.y, pos.x - prevPos.x);

          ctx.save();
          ctx.translate(pos.x, pos.y);
          ctx.rotate(dAngle);
          const flip = pos.x < prevPos.x ? -1 : 1;
          ctx.scale(flip, 1);
          const bobOffset = Math.sin(Date.now() * 0.005 + d) * 3;
          ctx.translate(0, bobOffset);
          ctx.font = '22px serif';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText('🐣', 0, 0);
          ctx.restore();
        }

        animId = requestAnimationFrame(tick);
      }
      tick();

      demoCleanup = () => {
        cancelAnimationFrame(animId);
        document.removeEventListener('mousemove', onMove);
        overlay.classList.remove('duck-overlay');
      };
    }

            const txt = document.createTextNode(fullMsg[charIdx]);
            speech.insertBefore(txt, cursor);
            charIdx++;
          } else {
            clearInterval(typeInterval);
            cursor.style.animation = 'none';
            cursor.style.opacity = '0';
          }
        }, 80);
      }, 4000);

      demoCleanup = () => {
        clearTimeout(typeTimeout);
        if (typeInterval) clearInterval(typeInterval);
        overlay.classList.remove('sloth-overlay');
      };
    }

// #22: CURSOR MAGNET
// A glowing orb at the right edge draws a bezier line to the cursor.
// ══════════════════════════════════════════════════════════════
function demoCursorMagnet(content, overlay) {
  overlay.classList.add('magnet-overlay');

  const canvas = document.createElement('canvas');
  canvas.style.cssText = 'position:fixed;inset:0;z-index:1050;pointer-events:none;';
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  content.appendChild(canvas);
  const ctx = canvas.getContext('2d');

  // Orb element
  const orbWrap = document.createElement('div');
  orbWrap.style.cssText = `
    position:fixed;right:32px;top:50%;transform:translateY(-50%);
    z-index:1062;pointer-events:none;display:flex;flex-direction:column;
    align-items:center;gap:10px;
  `;

  const orbEl = document.createElement('div');
  orbEl.style.cssText = `
    width:80px;height:80px;border-radius:50%;
    background:radial-gradient(circle at 38% 32%, #fff8e1 0%, #d4a847 40%, #a07820 80%);
    box-shadow:0 0 0 8px rgba(212,168,71,0.15),0 0 40px rgba(212,168,71,0.6),0 0 80px rgba(212,168,71,0.3);
    display:flex;align-items:center;justify-content:center;
    font-family:var(--serif);font-size:11px;font-weight:600;color:rgba(0,0,0,0.7);
    text-align:center;padding:8px;line-height:1.3;
    animation:orbPulse 2.4s ease-in-out infinite;
  `;
  orbEl.textContent = 'Manager 1:1';

  const orbLabel = document.createElement('div');
  orbLabel.style.cssText = 'font-size:11px;color:rgba(212,168,71,0.7);font-weight:600;letter-spacing:0.06em;text-transform:uppercase;white-space:nowrap;font-family:var(--sans);';
  orbLabel.textContent = '5 min';

  const styleTag = document.createElement('style');
  styleTag.textContent = `
    @keyframes orbPulse {
      0%,100%{box-shadow:0 0 0 8px rgba(212,168,71,0.15),0 0 40px rgba(212,168,71,0.6),0 0 80px rgba(212,168,71,0.3);}
      50%{box-shadow:0 0 0 16px rgba(212,168,71,0.08),0 0 60px rgba(212,168,71,0.9),0 0 120px rgba(212,168,71,0.5);}
    }
  `;
  document.head.appendChild(styleTag);

  orbWrap.appendChild(orbEl);
  orbWrap.appendChild(orbLabel);
  content.appendChild(orbWrap);

  let mouseX = window.innerWidth / 2;
  let mouseY = window.innerHeight / 2;
  const orbX = window.innerWidth - 72;
  const orbY = window.innerHeight / 2;

  const onMove = (e) => { mouseX = e.clientX; mouseY = e.clientY; };
  document.addEventListener('mousemove', onMove);

  let animId;
  function draw() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    const dx = orbX - mouseX;
    const dy = orbY - mouseY;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const t = Math.min(1, dist / 600);

    // Bezier control points
    const cp1x = mouseX + dx * 0.25 + (mouseY - orbY) * 0.15;
    const cp1y = mouseY + dy * 0.25;
    const cp2x = orbX - dx * 0.25;
    const cp2y = orbY - dy * 0.25;

    // Gradient along the line
    const grad = ctx.createLinearGradient(mouseX, mouseY, orbX, orbY);
    const alpha = 0.25 + t * 0.55;
    grad.addColorStop(0, `rgba(212,168,71,${alpha * 0.5})`);
    grad.addColorStop(0.5, `rgba(255,220,100,${alpha})`);
    grad.addColorStop(1, `rgba(212,168,71,${alpha * 0.8})`);

    // Line thickness by distance
    const thickness = 1.5 + t * 3.5;

    ctx.beginPath();
    ctx.moveTo(mouseX, mouseY);
    ctx.bezierCurveTo(cp1x, cp1y, cp2x, cp2y, orbX, orbY);
    ctx.strokeStyle = grad;
    ctx.lineWidth = thickness;
    ctx.lineCap = 'round';
    ctx.shadowColor = 'rgba(212,168,71,0.6)';
    ctx.shadowBlur = 12 + t * 20;
    ctx.stroke();
    ctx.shadowBlur = 0;

    // Cursor glow dot
    ctx.beginPath();
    ctx.arc(mouseX, mouseY, 5 + t * 4, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(212,168,71,${0.4 + t * 0.5})`;
    ctx.shadowColor = 'rgba(212,168,71,0.8)';
    ctx.shadowBlur = 16;
    ctx.fill();
    ctx.shadowBlur = 0;

    animId = requestAnimationFrame(draw);
  }
  draw();

  demoCleanup = () => {
    cancelAnimationFrame(animId);
    document.removeEventListener('mousemove', onMove);
    overlay.classList.remove('magnet-overlay');
    styleTag.remove();
  };
}

// #23: BUBBLE POP
// 8 glass bubbles rise with task words; click to pop them.
// ══════════════════════════════════════════════════════════════
function demoBubblePop(content, overlay) {
  overlay.classList.add('bubblepop-overlay');

  const words = ['MANAGER', '1:1', 'IN', '5', 'MIN', '—', 'TIME', 'TO', 'MOVE!'];
  const bubbleData = [];
  let poppedCount = 0;
  const total = words.length;

  const success = document.createElement('div');
  success.className = 'bp-success';
  success.innerHTML = '<div style="font-size:56px">✨</div><div class="bp-success-text">All clear — let\'s go!</div><div class="bp-success-sub">Manager 1:1 awaits</div>';
  content.appendChild(success);

  words.forEach((word, i) => {
    const size = 72 + word.length * 10;
    const startX = 60 + Math.random() * (window.innerWidth - size - 120);
    const startY = window.innerHeight + 40;
    const targetY = 80 + Math.random() * (window.innerHeight - 260);
    const duration = 3000 + Math.random() * 2000;
    const delay = i * 280 + Math.random() * 200;
    const wobble = (Math.random() - 0.5) * 80;

    const bub = document.createElement('div');
    bub.className = 'bp-bubble';
    bub.style.cssText = `
      width:${size}px;height:${size}px;
      left:${startX}px;top:${startY}px;
    `;
    bub.innerHTML = `<span>${word}</span>`;
    content.appendChild(bub);

    // Rise animation via JS
    let start = null;
    let popped = false;

    const rise = (ts) => {
      if (popped) return;
      if (!start) start = ts + delay;
      const elapsed = ts - start;
      if (elapsed < 0) { requestAnimationFrame(rise); return; }
      const progress = Math.min(elapsed / duration, 1);
      const eased = 1 - Math.pow(1 - progress, 2);
      const curY = startY + (targetY - startY) * eased;
      const curX = startX + Math.sin(elapsed / 600) * wobble;
      bub.style.left = curX + 'px';
      bub.style.top = curY + 'px';
      if (progress < 1) requestAnimationFrame(rise);
    };
    requestAnimationFrame(rise);

    bub.addEventListener('click', () => {
      if (popped) return;
      popped = true;
      bub.classList.add('popped');

      // Pop particles
      for (let p = 0; p < 10; p++) {
        const dot = document.createElement('div');
        const angle = (p / 10) * Math.PI * 2;
        const r = 30 + Math.random() * 40;
        dot.style.cssText = `
          position:fixed;width:6px;height:6px;border-radius:50%;
          background:rgba(180,220,255,0.8);z-index:1070;pointer-events:none;
          left:${parseFloat(bub.style.left) + size/2}px;
          top:${parseFloat(bub.style.top) + size/2}px;
          transition:all 0.4s ease-out;opacity:1;
        `;
        content.appendChild(dot);
        requestAnimationFrame(() => {
          dot.style.transform = `translate(${Math.cos(angle)*r}px,${Math.sin(angle)*r}px)`;
          dot.style.opacity = '0';
        });
        setTimeout(() => dot.remove(), 500);
      }

      setTimeout(() => bub.remove(), 400);
      poppedCount++;
      if (poppedCount === total) {
        setTimeout(() => success.classList.add('show'), 200);
      }
    });

    bubbleData.push({ bub, popped: () => popped });
  });

  demoCleanup = () => {
    overlay.classList.remove('bubblepop-overlay');
  };
}

// #26: ELASTIC BAND
// Canvas bezier from center pin to cursor; color/thickness by distance.
// ══════════════════════════════════════════════════════════════
function demoElasticBand(content, overlay) {
  overlay.classList.add('elastic-overlay');

  const canvas = document.createElement('canvas');
  canvas.style.cssText = 'position:fixed;inset:0;z-index:1050;pointer-events:none;';
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  content.appendChild(canvas);
  const ctx = canvas.getContext('2d');

  const pin = document.createElement('div');
  pin.className = 'elastic-pin';
  pin.innerHTML = '<span class="elastic-pin-icon">📌</span>';
  content.appendChild(pin);

  const pinLabel = document.createElement('div');
  pinLabel.className = 'elastic-pin-label';
  pinLabel.textContent = 'Manager 1:1';
  content.appendChild(pinLabel);

  const pinX = window.innerWidth / 2;
  const pinY = window.innerHeight / 2;

  let mouseX = pinX + 120;
  let mouseY = pinY - 60;
  const onMove = (e) => { mouseX = e.clientX; mouseY = e.clientY; };
  document.addEventListener('mousemove', onMove);

  // snap-back spring physics
  let snapX = mouseX, snapY = mouseY;
  let vx = 0, vy = 0;
  let released = false;
  const releaseTimeout = setTimeout(() => { released = true; }, 6000);

  let animId;
  function draw() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    let drawX, drawY;
    if (!released) {
      drawX = mouseX;
      drawY = mouseY;
    } else {
      // spring toward pin
      const dx = pinX - snapX;
      const dy = pinY - snapY;
      vx += dx * 0.08;
      vy += dy * 0.08;
      vx *= 0.72;
      vy *= 0.72;
      snapX += vx;
      snapY += vy;
      drawX = snapX;
      drawY = snapY;
    }

    const dx = drawX - pinX;
    const dy = drawY - pinY;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const maxDist = 400;
    const t = Math.min(dist / maxDist, 1);

    // Color from green (close) → amber (mid) → urgent red (far)
    const r = Math.round(111 + t * (196 - 111));
    const g = Math.round(146 + t * (98 - 146));
    const b = Math.round(114 + t * (45 - 114));
    const bandColor = `rgba(${r},${g},${b},${0.7 + t * 0.3})`;

    const thickness = 2 + t * 7;

    // Bezier — control point perpendicular to midpoint
    const midX = (pinX + drawX) / 2;
    const midY = (pinY + drawY) / 2;
    const perpX = -(dy) * 0.2 * t;
    const perpY = dx * 0.2 * t;
    const cpX = midX + perpX;
    const cpY = midY + perpY;

    // Draw band shadow
    ctx.beginPath();
    ctx.moveTo(pinX, pinY);
    ctx.quadraticCurveTo(cpX, cpY, drawX, drawY);
    ctx.strokeStyle = `rgba(0,0,0,0.3)`;
    ctx.lineWidth = thickness + 2;
    ctx.lineCap = 'round';
    ctx.stroke();

    // Draw band
    ctx.beginPath();
    ctx.moveTo(pinX, pinY);
    ctx.quadraticCurveTo(cpX, cpY, drawX, drawY);
    ctx.strokeStyle = bandColor;
    ctx.lineWidth = thickness;
    ctx.lineCap = 'round';
    ctx.shadowColor = bandColor;
    ctx.shadowBlur = 8 + t * 16;
    ctx.stroke();
    ctx.shadowBlur = 0;

    // Cursor endpoint dot
    ctx.beginPath();
    ctx.arc(drawX, drawY, 6 + t * 4, 0, Math.PI * 2);
    ctx.fillStyle = bandColor;
    ctx.shadowColor = bandColor;
    ctx.shadowBlur = 12;
    ctx.fill();
    ctx.shadowBlur = 0;

    animId = requestAnimationFrame(draw);
  }
  draw();

  demoCleanup = () => {
    cancelAnimationFrame(animId);
    clearTimeout(releaseTimeout);
    document.removeEventListener('mousemove', onMove);
    overlay.classList.remove('elastic-overlay');
  };
}
