// #27: SNOW GLOBE
// Canvas circle with falling snow; frosted glass border; scroll to shake.
// ══════════════════════════════════════════════════════════════
function demoSnowGlobe(content, overlay) {
  overlay.classList.add('globe-overlay');

  const W = window.innerWidth, H = window.innerHeight;
  const cx = W / 2, cy = H / 2;
  const GR = Math.min(W, H) * 0.36;

  const canvas = document.createElement('canvas');
  canvas.style.cssText = 'position:fixed;inset:0;z-index:1050;pointer-events:none;';
  canvas.width = W; canvas.height = H;
  content.appendChild(canvas);
  const ctx = canvas.getContext('2d');

  // Stars behind globe
  const stars = Array.from({length: 80}, () => ({
    x: Math.random() * W, y: Math.random() * H,
    r: 0.5 + Math.random() * 1.5,
    a: Math.random(),
    s: 0.004 + Math.random() * 0.008
  }));

  // Snowflakes inside globe
  const flakes = Array.from({length: 120}, () => ({
    x: cx + (Math.random() - 0.5) * GR * 1.8,
    y: cy + (Math.random() - 0.5) * GR * 1.8,
    r: 0.8 + Math.random() * 2.5,
    vy: 0.3 + Math.random() * 0.7,
    vx: (Math.random() - 0.5) * 0.4,
    alpha: 0.5 + Math.random() * 0.5,
    wobble: Math.random() * Math.PI * 2
  }));

  let shakeX = 0, shakeY = 0;
  let shakeVx = 0, shakeVy = 0;

  const onScroll = (e) => {
    shakeVx += (Math.random() - 0.5) * 6;
    shakeVy += Math.random() * 4;
    flakes.forEach(f => {
      f.vx += (Math.random() - 0.5) * 3;
      f.vy += (Math.random() - 0.5) * 3;
    });
  };
  document.addEventListener('wheel', onScroll);

  let t = 0;
  let animId;
  function draw() {
    ctx.clearRect(0, 0, W, H);
    t += 0.016;

    // Background stars
    stars.forEach(s => {
      s.a += s.s;
      const alpha = 0.2 + 0.5 * Math.abs(Math.sin(s.a));
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,255,${alpha})`;
      ctx.fill();
    });

    // Spring settle shake
    shakeVx *= 0.88; shakeVy *= 0.88;
    shakeX += shakeVx * 0.04; shakeY += shakeVy * 0.04;
    shakeX *= 0.9; shakeY *= 0.9;

    // Clip to circle
    ctx.save();
    ctx.beginPath();
    ctx.arc(cx, cy, GR, 0, Math.PI * 2);
    ctx.clip();

    // Globe interior gradient
    const grd = ctx.createRadialGradient(cx - GR*0.3, cy - GR*0.3, 0, cx, cy, GR);
    grd.addColorStop(0, 'rgba(180,210,255,0.12)');
    grd.addColorStop(0.6, 'rgba(100,150,220,0.08)');
    grd.addColorStop(1, 'rgba(30,60,120,0.25)');
    ctx.fillStyle = grd;
    ctx.fillRect(cx - GR, cy - GR, GR * 2, GR * 2);

    // Message text
    ctx.font = `300 ${Math.round(GR * 0.115)}px 'Fraunces', Georgia, serif`;
    ctx.textAlign = 'center';
    ctx.fillStyle = 'rgba(255,255,255,0.92)';
    ctx.shadowColor = 'rgba(200,230,255,0.6)';
    ctx.shadowBlur = 12;
    ctx.fillText('Manager 1:1', cx + shakeX * 0.5, cy - GR * 0.08 + shakeY * 0.5);
    ctx.font = `400 ${Math.round(GR * 0.085)}px 'Inter', sans-serif`;
    ctx.fillStyle = 'rgba(200,220,255,0.7)';
    ctx.fillText('in 5 minutes', cx + shakeX * 0.5, cy + GR * 0.12 + shakeY * 0.5);
    ctx.shadowBlur = 0;

    // Snow flakes
    flakes.forEach(f => {
      f.wobble += 0.03;
      f.vx += Math.sin(f.wobble) * 0.02 + shakeVx * 0.008;
      f.vy += 0.015 + shakeVy * 0.008;
      f.vx *= 0.98; f.vy *= 0.98;
      f.x += f.vx; f.y += f.vy;

      // Bounce off globe walls
      const dfx = f.x - cx, dfy = f.y - cy;
      const df = Math.sqrt(dfx*dfx + dfy*dfy);
      if (df > GR - f.r * 2) {
        const nx = dfx / df, ny = dfy / df;
        const dot = f.vx * nx + f.vy * ny;
        f.vx -= 2 * dot * nx * 0.5;
        f.vy -= 2 * dot * ny * 0.5;
        f.x = cx + nx * (GR - f.r * 2 - 1);
        f.y = cy + ny * (GR - f.r * 2 - 1);
      }

      ctx.beginPath();
      ctx.arc(f.x + shakeX * 0.3, f.y + shakeY * 0.3, f.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(220,235,255,${f.alpha})`;
      ctx.fill();
    });

    ctx.restore();

    // Globe border — frosted glass ring
    ctx.beginPath();
    ctx.arc(cx, cy, GR, 0, Math.PI * 2);
    const borderGrd = ctx.createLinearGradient(cx - GR, cy - GR, cx + GR, cy + GR);
    borderGrd.addColorStop(0, 'rgba(255,255,255,0.55)');
    borderGrd.addColorStop(0.4, 'rgba(200,220,255,0.25)');
    borderGrd.addColorStop(1, 'rgba(100,140,200,0.4)');
    ctx.strokeStyle = borderGrd;
    ctx.lineWidth = 6;
    ctx.shadowColor = 'rgba(180,210,255,0.4)';
    ctx.shadowBlur = 20;
    ctx.stroke();
    ctx.shadowBlur = 0;

    // Highlight glint
    ctx.beginPath();
    ctx.arc(cx - GR * 0.38, cy - GR * 0.38, GR * 0.18, 0, Math.PI * 2);
    const glint = ctx.createRadialGradient(cx - GR*0.38, cy - GR*0.38, 0, cx - GR*0.38, cy - GR*0.38, GR*0.18);
    glint.addColorStop(0, 'rgba(255,255,255,0.4)');
    glint.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = glint;
    ctx.fill();

    // Base / pedestal
    const baseGrd = ctx.createLinearGradient(cx - GR*0.5, cy + GR, cx + GR*0.5, cy + GR + 30);
    baseGrd.addColorStop(0, 'rgba(60,80,120,0.8)');
    baseGrd.addColorStop(1, 'rgba(30,50,90,0.9)');
    ctx.beginPath();
    ctx.ellipse(cx, cy + GR + 4, GR * 0.55, 18, 0, 0, Math.PI * 2);
    ctx.fillStyle = baseGrd;
    ctx.fill();
    ctx.beginPath();
    ctx.rect(cx - GR * 0.18, cy + GR - 2, GR * 0.36, 22);
    ctx.fillStyle = 'rgba(40,60,100,0.9)';
    ctx.fill();

    // Hint label
    ctx.font = '500 13px Inter, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = 'rgba(180,200,255,0.55)';
    ctx.fillText('Scroll to shake', cx, cy + GR + 52);

    animId = requestAnimationFrame(draw);
  }
  draw();

  demoCleanup = () => {
    cancelAnimationFrame(animId);
    document.removeEventListener('wheel', onScroll);
    overlay.classList.remove('globe-overlay');
  };
}

// ══════════════════════════════════════════════════════════════
// #28: RIPPLE TOUCH
// Click creates iridescent expanding ring ripples on canvas.
// ══════════════════════════════════════════════════════════════
function demoRippleTouch(content, overlay) {
  overlay.classList.add('ripple-overlay');

  const canvas = document.createElement('canvas');
  canvas.style.cssText = 'position:fixed;inset:0;z-index:1050;';
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  content.appendChild(canvas);
  const ctx = canvas.getContext('2d');

  const hint = document.createElement('div');
  hint.className = 'ripple-hint';
  hint.innerHTML = '<div class="ripple-hint-text">Click anywhere to ripple</div>';
  content.appendChild(hint);

  const ripples = [];
  const taskWords = ['Manager', '1:1', '→', 'Now'];
  let wordIdx = 0;

  const onClick = (e) => {
    if (e.target.closest('.demo-dismiss')) return;
    hint.style.opacity = '0';
    const word = taskWords[wordIdx % taskWords.length];
    wordIdx++;
    ripples.push({
      x: e.clientX,
      y: e.clientY,
      r: 0,
      maxR: Math.max(window.innerWidth, window.innerHeight) * 0.7,
      alpha: 1,
      hue: 180 + Math.random() * 160,
      word,
      wordAlpha: 1,
      born: performance.now()
    });
  };
  overlay.addEventListener('click', onClick);

  let animId;
  function draw(ts) {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    for (let i = ripples.length - 1; i >= 0; i--) {
      const rp = ripples[i];
      const age = (ts - rp.born) / 1000;
      rp.r = age * 380;
      rp.alpha = Math.max(0, 1 - age * 0.7);
      rp.wordAlpha = Math.max(0, 1 - Math.max(0, age - 0.5) * 1.5);

      if (rp.alpha <= 0) { ripples.splice(i, 1); continue; }

      // Iridescent gradient stroke
      const grad = ctx.createLinearGradient(
        rp.x - rp.r, rp.y - rp.r,
        rp.x + rp.r, rp.y + rp.r
      );
      grad.addColorStop(0,   `hsla(${rp.hue},     80%, 70%, ${rp.alpha})`);
      grad.addColorStop(0.25,`hsla(${rp.hue+60},  85%, 75%, ${rp.alpha})`);
      grad.addColorStop(0.5, `hsla(${rp.hue+120}, 80%, 80%, ${rp.alpha})`);
      grad.addColorStop(0.75,`hsla(${rp.hue+180}, 85%, 75%, ${rp.alpha})`);
      grad.addColorStop(1,   `hsla(${rp.hue+240}, 80%, 70%, ${rp.alpha})`);

      // Outer ring
      ctx.beginPath();
      ctx.arc(rp.x, rp.y, rp.r, 0, Math.PI * 2);
      ctx.strokeStyle = grad;
      ctx.lineWidth = 2.5;
      ctx.shadowColor = `hsla(${rp.hue+60},80%,70%,0.6)`;
      ctx.shadowBlur = 12;
      ctx.stroke();

      // Inner ring (offset)
      if (rp.r > 24) {
        ctx.beginPath();
        ctx.arc(rp.x, rp.y, rp.r * 0.7, 0, Math.PI * 2);
        ctx.strokeStyle = `hsla(${rp.hue+90},75%,72%,${rp.alpha * 0.4})`;
        ctx.lineWidth = 1;
        ctx.shadowBlur = 0;
        ctx.stroke();
      }
      ctx.shadowBlur = 0;

      // Word label near origin, fades
      if (rp.wordAlpha > 0) {
        ctx.font = `600 16px 'Inter', sans-serif`;
        ctx.textAlign = 'center';
        ctx.fillStyle = `hsla(${rp.hue},80%,85%,${rp.wordAlpha})`;
        ctx.shadowColor = `hsla(${rp.hue},80%,70%,${rp.wordAlpha * 0.8})`;
        ctx.shadowBlur = 10;
        ctx.fillText(rp.word, rp.x, rp.y - 16);
        ctx.shadowBlur = 0;
      }
    }

    animId = requestAnimationFrame(draw);
  }
  animId = requestAnimationFrame(draw);

  demoCleanup = () => {
    cancelAnimationFrame(animId);
    overlay.removeEventListener('click', onClick);
    overlay.classList.remove('ripple-overlay');
  };
}

// ══════════════════════════════════════════════════════════════
// #29: MAGNETIC LETTERS
// Colorful draggable fridge-magnet tiles; drift slowly; drop zone.
// ══════════════════════════════════════════════════════════════
function demoMagneticLetters(content, overlay) {
  overlay.classList.add('letters-overlay');

  const word = 'MANAGER';
  const palette = ['#C4622D','#D4A847','#6F9272','#2C2C3A','#6B5E8A','#3A7CA5','#C4622D'];
  const W = window.innerWidth, H = window.innerHeight;

  const instruction = document.createElement('div');
  instruction.className = 'letters-instruction';
  instruction.textContent = 'Drag the letters to the tray below';
  content.appendChild(instruction);

  const dropZone = document.createElement('div');
  dropZone.className = 'letters-drop-zone';
  dropZone.textContent = 'Drop here to acknowledge';
  content.appendChild(dropZone);

  const letters = [];
  let droppedCount = 0;

  word.split('').forEach((ch, i) => {
    const tile = document.createElement('div');
    tile.className = 'fridge-letter';
    tile.textContent = ch;
    tile.style.background = palette[i % palette.length];

    // Random initial position (upper area)
    let px = 80 + Math.random() * (W - 200);
    let py = 100 + Math.random() * (H * 0.5 - 120);
    // Slight tilt
    const initRot = (Math.random() - 0.5) * 14;
    tile.style.left = px + 'px';
    tile.style.top = py + 'px';
    tile.style.transform = `rotate(${initRot}deg)`;

    let isDragging = false, startMX = 0, startMY = 0, startPX = 0, startPY = 0;
    let driftVX = (Math.random() - 0.5) * 0.35;
    let driftVY = (Math.random() - 0.5) * 0.35;
    let dropped = false;

    // Drift animation
    let driftId;
    function drift() {
      if (isDragging || dropped) return;
      px += driftVX;
      py += driftVY;
      if (px < 20) { px = 20; driftVX *= -1; }
      if (px > W - 68) { px = W - 68; driftVX *= -1; }
      if (py < 80) { py = 80; driftVY *= -1; }
      if (py > H * 0.55) { py = H * 0.55; driftVY *= -1; }
      tile.style.left = px + 'px';
      tile.style.top = py + 'px';
      driftId = requestAnimationFrame(drift);
    }
    driftId = requestAnimationFrame(drift);

    const onDown = (e) => {
      if (dropped) return;
      e.preventDefault();
      isDragging = true;
      tile.classList.add('dragging');
      cancelAnimationFrame(driftId);
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;
      startMX = clientX; startMY = clientY;
      startPX = px; startPY = py;
    };
    const onMove = (e) => {
      if (!isDragging) return;
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;
      px = startPX + (clientX - startMX);
      py = startPY + (clientY - startMY);
      tile.style.left = px + 'px';
      tile.style.top = py + 'px';
    };
    const onUp = (e) => {
      if (!isDragging) return;
      isDragging = false;
      tile.classList.remove('dragging');
      tile.style.transform = `rotate(${(Math.random()-0.5)*6}deg)`;

      // Check if over drop zone
      const dz = dropZone.getBoundingClientRect();
      const tx = px + 24, ty = py + 28;
      if (tx > dz.left && tx < dz.right && ty > dz.top && ty < dz.bottom) {
        dropped = true;
        droppedCount++;
        tile.style.transition = 'all 0.3s var(--ease-bounce)';
        tile.style.transform = 'scale(0.85) rotate(0deg)';
        tile.style.opacity = '0.6';
        tile.style.pointerEvents = 'none';
        // Place in drop zone
        const slot = dz.left + 16 + (droppedCount - 1) * 52;
        tile.style.left = slot + 'px';
        tile.style.top = (dz.top + 12) + 'px';
        tile.style.width = '44px';
        tile.style.height = '48px';
        tile.style.fontSize = '22px';
        setTimeout(() => tile.style.transition = '', 350);

        if (droppedCount === word.length) {
          dropZone.style.borderColor = 'var(--upcoming)';
          dropZone.style.background = 'rgba(111,146,114,0.12)';
          dropZone.textContent = '';
          const msg = document.createElement('div');
          msg.style.cssText = 'font-size:13px;font-weight:600;color:var(--upcoming);font-family:var(--sans);';
          msg.textContent = '✓ Acknowledged — heading to Manager 1:1';
          dropZone.appendChild(msg);
          instruction.textContent = 'Time to transition!';
        }
      } else {
        // bounce back to drift
        driftVX = (Math.random() - 0.5) * 0.4;
        driftVY = (Math.random() - 0.5) * 0.4;
        driftId = requestAnimationFrame(drift);
      }
    };

    tile.addEventListener('mousedown', onDown);
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
    tile.addEventListener('touchstart', onDown, {passive:false});
    document.addEventListener('touchmove', onMove, {passive:false});
    document.addEventListener('touchend', onUp);

    content.appendChild(tile);
    letters.push({ tile, driftId, onMove, onUp });
  });

  demoCleanup = () => {
    letters.forEach(l => {
      cancelAnimationFrame(l.driftId);
      document.removeEventListener('mousemove', l.onMove);
      document.removeEventListener('mouseup', l.onUp);
      document.removeEventListener('touchmove', l.onMove);
      document.removeEventListener('touchend', l.onUp);
    });
    overlay.classList.remove('letters-overlay');
  };
}

// ══════════════════════════════════════════════════════════════
// #30: BLACK HOLE
// Canvas vortex at bottom-right; dark spiral; accretion disk;
// particles spiral inward.
// ══════════════════════════════════════════════════════════════
function demoBlackHole(content, overlay) {
  overlay.classList.add('blackhole-overlay');

  const canvas = document.createElement('canvas');
  canvas.style.cssText = 'position:fixed;inset:0;z-index:1050;pointer-events:none;';
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  content.appendChild(canvas);
  const ctx = canvas.getContext('2d');

  const W = window.innerWidth, H = window.innerHeight;
  const bx = W - 80, by = H - 80;
  let bRadius = 28;
  const maxRadius = 140;

  // Particles
  const particles = Array.from({length: 180}, (_, i) => {
    const angle = Math.random() * Math.PI * 2;
    const dist = 80 + Math.random() * Math.min(W, H) * 0.5;
    return {
      x: bx + Math.cos(angle) * dist,
      y: by + Math.sin(angle) * dist,
      angle,
      dist,
      speed: 0.008 + Math.random() * 0.018,
      size: 1 + Math.random() * 2.5,
      alpha: 0.3 + Math.random() * 0.6,
      hue: 220 + Math.random() * 60
    };
  });

  // Label
  const label = document.createElement('div');
  label.style.cssText = `
    position:fixed;bottom:${H - by + 30}px;right:${W - bx + 20}px;
    z-index:1060;font-family:var(--serif);font-size:13px;
    color:rgba(180,160,255,0.7);pointer-events:none;white-space:nowrap;
    text-shadow:0 0 8px rgba(120,80,200,0.6);
  `;
  label.textContent = 'Everything flows here…';
  content.appendChild(label);

  let t = 0;
  let animId;
  function draw() {
    t += 0.012;
    bRadius = Math.min(maxRadius, 28 + t * 4);

    ctx.clearRect(0, 0, W, H);

    // Accretion disk rings
    for (let ring = 0; ring < 5; ring++) {
      const ringR = bRadius + 14 + ring * 18;
      const ringAlpha = Math.max(0, 0.18 - ring * 0.025);
      const ringGrd = ctx.createConicalGradient
        ? null
        : (() => {
          const rg = ctx.createLinearGradient(bx - ringR, by, bx + ringR, by);
          rg.addColorStop(0,   `hsla(${270+ring*15},80%,60%,0)`);
          rg.addColorStop(0.3, `hsla(${270+ring*15},80%,65%,${ringAlpha})`);
          rg.addColorStop(0.6, `hsla(${220+ring*20},75%,70%,${ringAlpha*0.7})`);
          rg.addColorStop(1,   `hsla(${270+ring*15},80%,60%,0)`);
          return rg;
        })();

      ctx.beginPath();
      ctx.ellipse(bx, by, ringR, ringR * 0.28, t * 0.2 + ring * 0.3, 0, Math.PI * 2);
      ctx.strokeStyle = ringGrd || `rgba(160,100,255,${ringAlpha})`;
      ctx.lineWidth = 3 - ring * 0.4;
      ctx.shadowColor = `rgba(160,80,255,${ringAlpha * 2})`;
      ctx.shadowBlur = 12;
      ctx.stroke();
      ctx.shadowBlur = 0;
    }

    // Spiral arms of the vortex
    for (let arm = 0; arm < 3; arm++) {
      const armOffset = (arm / 3) * Math.PI * 2;
      ctx.beginPath();
      let first = true;
      for (let i = 0; i < 120; i++) {
        const ang = (i / 120) * Math.PI * 6 + t * 1.2 + armOffset;
        const r = (i / 120) * bRadius * 3.5;
        const px = bx + Math.cos(ang) * r;
        const py = by + Math.sin(ang) * r * 0.55;
        const alpha = (1 - i / 120) * 0.12;
        if (first) { ctx.moveTo(px, py); first = false; }
        else ctx.lineTo(px, py);
      }
      ctx.strokeStyle = `rgba(180,120,255,0.15)`;
      ctx.lineWidth = 1;
      ctx.stroke();
    }

    // Particles spiraling inward
    particles.forEach(p => {
      const pull = bRadius / Math.max(1, p.dist);
      p.angle += p.speed + pull * 0.08;
      p.dist -= pull * 0.6 + 0.18;

      if (p.dist < bRadius * 0.5) {
        // Reset particle at outer edge
        p.angle = Math.random() * Math.PI * 2;
        p.dist = 100 + Math.random() * Math.min(W, H) * 0.45;
        p.size = 1 + Math.random() * 2.5;
        p.alpha = 0.3 + Math.random() * 0.6;
      }

      p.x = bx + Math.cos(p.angle) * p.dist;
      p.y = by + Math.sin(p.angle) * p.dist * 0.75;

      const proximityT = Math.max(0, 1 - p.dist / 200);
      const stretchX = 1 + proximityT * 3;

      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.angle);
      ctx.beginPath();
      ctx.ellipse(0, 0, p.size * stretchX, p.size * 0.7, 0, 0, Math.PI * 2);
      ctx.fillStyle = `hsla(${p.hue},70%,75%,${p.alpha * (1 - proximityT * 0.5)})`;
      ctx.shadowColor = `hsla(${p.hue},80%,70%,0.4)`;
      ctx.shadowBlur = 4;
      ctx.fill();
      ctx.restore();
    });
    ctx.shadowBlur = 0;

    // Event horizon — deep black circle
    const eventGrd = ctx.createRadialGradient(bx, by, 0, bx, by, bRadius);
    eventGrd.addColorStop(0,   'rgba(0,0,0,1)');
    eventGrd.addColorStop(0.7, 'rgba(0,0,0,1)');
    eventGrd.addColorStop(0.88,'rgba(20,5,40,0.9)');
    eventGrd.addColorStop(1,   'rgba(0,0,0,0)');
    ctx.beginPath();
    ctx.arc(bx, by, bRadius * 1.1, 0, Math.PI * 2);
    ctx.fillStyle = eventGrd;
    ctx.fill();

    // Photon ring glow
    ctx.beginPath();
    ctx.arc(bx, by, bRadius, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(200,150,255,${0.12 + Math.sin(t * 2) * 0.06})`;
    ctx.lineWidth = 3;
    ctx.shadowColor = 'rgba(180,100,255,0.7)';
    ctx.shadowBlur = 20;
    ctx.stroke();
    ctx.shadowBlur = 0;

    // Gravitational lensing shimmer lines
    for (let l = 0; l < 4; l++) {
      const lAngle = t * 0.5 + (l / 4) * Math.PI * 2;
      const lLen = bRadius * 1.8;
      ctx.beginPath();
      ctx.moveTo(bx + Math.cos(lAngle) * bRadius * 1.05, by + Math.sin(lAngle) * bRadius * 1.05);
      ctx.lineTo(bx + Math.cos(lAngle) * (bRadius + lLen), by + Math.sin(lAngle) * (bRadius + lLen));
      ctx.strokeStyle = `rgba(255,200,255,${0.04 + Math.sin(t*3+l)*0.02})`;
      ctx.lineWidth = 1.5;
      ctx.stroke();
    }

    animId = requestAnimationFrame(draw);
  }
  draw();

  demoCleanup = () => {
    cancelAnimationFrame(animId);
    overlay.classList.remove('blackhole-overlay');
  };
}

function demoAurora(content, overlay) {
  overlay.classList.add('aurora-overlay');

  const canvas = document.createElement('canvas');
  canvas.className = 'aurora-canvas';
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  content.appendChild(canvas);
  const ctx = canvas.getContext('2d');

  // Stars
  const stars = Array.from({ length: 200 }, () => ({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    r: 0.5 + Math.random() * 1.5,
    twinkle: Math.random() * Math.PI * 2
  }));

  // Aurora bands — each with a base y position (in upper portion), wave params, and color
  const bands = [
    { baseY: 0.08, amp: 0.04, freq: 0.0008, speed: 0.00035, phase: 0,      colorStops: ['rgba(0,230,180,0)', 'rgba(0,230,180,0.55)', 'rgba(0,200,160,0.7)', 'rgba(0,230,180,0.55)', 'rgba(0,230,180,0)'], width: 0.12 },
    { baseY: 0.14, amp: 0.05, freq: 0.0006, speed: 0.00028, phase: 1.2,    colorStops: ['rgba(80,255,200,0)', 'rgba(80,255,200,0.45)', 'rgba(60,220,180,0.65)', 'rgba(80,255,200,0.45)', 'rgba(80,255,200,0)'], width: 0.10 },
    { baseY: 0.20, amp: 0.06, freq: 0.0009, speed: 0.00042, phase: 2.5,    colorStops: ['rgba(60,200,255,0)', 'rgba(60,200,255,0.35)', 'rgba(40,180,240,0.55)', 'rgba(60,200,255,0.35)', 'rgba(60,200,255,0)'], width: 0.09 },
    { baseY: 0.06, amp: 0.035, freq: 0.0007, speed: 0.00022, phase: 0.8,   colorStops: ['rgba(140,80,255,0)', 'rgba(140,80,255,0.3)', 'rgba(120,60,240,0.5)', 'rgba(140,80,255,0.3)', 'rgba(140,80,255,0)'], width: 0.08 },
    { baseY: 0.17, amp: 0.04, freq: 0.0011, speed: 0.00050, phase: 3.7,    colorStops: ['rgba(0,255,140,0)', 'rgba(0,255,140,0.25)', 'rgba(0,240,120,0.45)', 'rgba(0,255,140,0.25)', 'rgba(0,255,140,0)'], width: 0.07 },
  ];

  let t = 0;
  let animId;

  function drawAurora() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Draw stars (vary brightness with time)
    stars.forEach(s => {
      s.twinkle += 0.015;
      const alpha = 0.3 + 0.5 * (0.5 + 0.5 * Math.sin(s.twinkle));
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,255,${alpha})`;
      ctx.fill();
    });

    // Draw aurora bands — render as a ribbon following a sine wave
    bands.forEach(band => {
      const W = canvas.width;
      const H = canvas.height;
      const halfW = band.width * H / 2;
      const steps = 120;

      ctx.save();
      const path = new Path2D();
      // top edge of band
      path.moveTo(0, (band.baseY + Math.sin(band.phase + t * band.speed * 1000) * band.amp) * H - halfW);
      for (let i = 1; i <= steps; i++) {
        const x = (i / steps) * W;
        const y = (band.baseY + Math.sin(band.phase + x * band.freq + t * band.speed * 1000) * band.amp) * H - halfW;
        path.lineTo(x, y);
      }
      // bottom edge (reverse)
      for (let i = steps; i >= 0; i--) {
        const x = (i / steps) * W;
        const y = (band.baseY + Math.sin(band.phase + x * band.freq + t * band.speed * 1000) * band.amp) * H + halfW;
        path.lineTo(x, y);
      }
      path.closePath();

      // Gradient along Y axis (top-to-bottom of band center)
      const centerY = band.baseY * H;
      const grad = ctx.createLinearGradient(0, centerY - halfW, 0, centerY + halfW);
      band.colorStops.forEach((stop, i) => grad.addColorStop(i / (band.colorStops.length - 1), stop));
      ctx.fillStyle = grad;
      ctx.fill(path);
      ctx.restore();
    });

    t++;
    animId = requestAnimationFrame(drawAurora);
  }

  drawAurora();

  const msgDiv = document.createElement('div');
  msgDiv.className = 'aurora-message';
  msgDiv.innerHTML = `
    <div class="aurora-msg-title">Look up. Time moves like this.</div>
    <div class="aurora-msg-sub">Manager 1:1 in 5 minutes</div>
  `;
  content.appendChild(msgDiv);

  demoCleanup = () => {
    cancelAnimationFrame(animId);
    overlay.classList.remove('aurora-overlay');
  };
}

function demoTide(content, overlay) {
  overlay.classList.add('tide-overlay');

  const canvas = document.createElement('canvas');
  canvas.className = 'tide-canvas';
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  content.appendChild(canvas);
  const ctx = canvas.getContext('2d');

  const W = canvas.width;
  const H = canvas.height;

  // Tide parameters
  const TOTAL_DURATION = 8000; // ms for tide to rise to 40% height
  const TARGET_FILL = 0.40;   // 40% of screen height
  let startTime = null;
  let currentFill = 0;  // fraction of screen filled (0 = none, 1 = full)

  // Wave params
  const waves = [
    { amp: 12, freq: 0.012, speed: 0.04, phase: 0, alpha: 0.9 },
    { amp: 8,  freq: 0.018, speed: 0.06, phase: 1.5, alpha: 0.6 },
    { amp: 5,  freq: 0.025, speed: 0.03, phase: 3.0, alpha: 0.4 },
  ];

  let waveT = 0;
  let buoyX = W * 0.72;
  let animId;

  // Buoy element
  const buoy = document.createElement('div');
  buoy.className = 'tide-buoy';
  buoy.textContent = '🛟';
  content.appendChild(buoy);

  function getWaterSurfaceY(x, fillFraction) {
    const baseY = H * (1 - fillFraction);
    let offset = 0;
    waves.forEach(w => {
      offset += Math.sin(x * w.freq + waveT * w.speed + w.phase) * w.amp * w.alpha;
    });
    return baseY + offset;
  }

  function draw(timestamp) {
    if (!startTime) startTime = timestamp;
    const elapsed = timestamp - startTime;
    currentFill = Math.min(TARGET_FILL, (elapsed / TOTAL_DURATION) * TARGET_FILL);

    ctx.clearRect(0, 0, W, H);

    // Draw layered water
    waves.forEach((w, wi) => {
      ctx.beginPath();
      const baseY = H * (1 - currentFill);
      ctx.moveTo(0, baseY);
      for (let x = 0; x <= W; x += 4) {
        let y = baseY;
        waves.slice(0, wi + 1).forEach(ww => {
          y += Math.sin(x * ww.freq + waveT * ww.speed + ww.phase) * ww.amp * ww.alpha;
        });
        ctx.lineTo(x, y);
      }
      ctx.lineTo(W, H);
      ctx.lineTo(0, H);
      ctx.closePath();

      const alpha = 0.12 + wi * 0.08;
      const grad = ctx.createLinearGradient(0, H * (1 - currentFill) - 20, 0, H);
      grad.addColorStop(0, `rgba(30,140,220,${alpha + 0.15})`);
      grad.addColorStop(0.3, `rgba(20,110,190,${alpha + 0.25})`);
      grad.addColorStop(1, `rgba(10,80,160,${alpha + 0.4})`);
      ctx.fillStyle = grad;
      ctx.fill();
    });

    // Main water body — top wave crest
    ctx.beginPath();
    const baseY = H * (1 - currentFill);
    ctx.moveTo(0, baseY);
    for (let x = 0; x <= W; x += 3) {
      let y = baseY;
      waves.forEach(w => {
        y += Math.sin(x * w.freq + waveT * w.speed + w.phase) * w.amp;
      });
      ctx.lineTo(x, y);
    }
    ctx.lineTo(W, H);
    ctx.lineTo(0, H);
    ctx.closePath();
    const mainGrad = ctx.createLinearGradient(0, baseY, 0, H);
    mainGrad.addColorStop(0, 'rgba(50,160,230,0.85)');
    mainGrad.addColorStop(0.4, 'rgba(30,120,200,0.9)');
    mainGrad.addColorStop(1, 'rgba(10,70,150,0.95)');
    ctx.fillStyle = mainGrad;
    ctx.fill();

    // Foam/crest highlight
    ctx.beginPath();
    ctx.moveTo(0, baseY);
    for (let x = 0; x <= W; x += 3) {
      let y = baseY;
      waves.forEach(w => {
        y += Math.sin(x * w.freq + waveT * w.speed + w.phase) * w.amp;
      });
      ctx.lineTo(x, y - 3);
    }
    ctx.strokeStyle = 'rgba(255,255,255,0.5)';
    ctx.lineWidth = 3;
    ctx.stroke();

    // Position buoy at waterline
    const buoyY = getWaterSurfaceY(buoyX, currentFill);
    const buoyScreenY = buoyY - 40;
    buoy.style.left = buoyX + 'px';
    buoy.style.bottom = (H - buoyScreenY - 36) + 'px';

    waveT += 1;
    animId = requestAnimationFrame(draw);
  }

  animId = requestAnimationFrame(draw);

  // Message card at top
  const msgDiv = document.createElement('div');
  msgDiv.className = 'tide-message';
  msgDiv.innerHTML = `
    <div class="tide-msg-card">
      <div class="tide-msg-title">The tide doesn't wait.</div>
      <div class="tide-msg-sub">Manager 1:1 rising in 5 minutes</div>
    </div>
  `;
  content.appendChild(msgDiv);

  demoCleanup = () => {
    cancelAnimationFrame(animId);
    overlay.classList.remove('tide-overlay');
  };
}

    <path d="M0,80 L0,50 Q80,35 160,48 Q240,60 320,42 Q400,24 480,40 Q560,56 640,44 Q720,32 800,50 Q880,68 960,52 Q1040,36 1120,48 Q1200,60 1280,46 Q1360,32 1440,50 L1440,80 Z" fill="rgba(0,0,0,0.35)"/>
  </svg>`;
  content.appendChild(ground);

  // Phase label
  const phaseLabel = document.createElement('div');
  phaseLabel.className = 'daynight-phase-label';
  phaseLabel.textContent = 'morning';
  content.appendChild(phaseLabel);

  // Center message
  const msgDiv = document.createElement('div');
  msgDiv.className = 'daynight-message';
  msgDiv.innerHTML = `
    <div class="daynight-msg-card">
      <div class="daynight-msg-title">A new task dawns.</div>
      <div class="daynight-msg-sub">Your day on this task is ending — Manager 1:1 in 5 minutes.</div>
    </div>
  `;
  content.appendChild(msgDiv);

  // Animate sun/moon across the sky
  const H = window.innerHeight;
  const W = window.innerWidth;
  const cycleDuration = 14000; // ms — matches CSS animation
  let startTime = performance.now();
  let animId;

  const phases = [
    { t: 0,    label: 'morning',  stars: 0 },
    { t: 0.2,  label: 'midday',   stars: 0 },
    { t: 0.35, label: 'sunset',   stars: 0.3 },
    { t: 0.5,  label: 'midnight', stars: 1 },
    { t: 0.65, label: 'deep night', stars: 1 },
    { t: 0.8,  label: 'dawn',     stars: 0.2 },
    { t: 1.0,  label: 'morning',  stars: 0 },
  ];

  function getPhase(frac) {
    for (let i = phases.length - 2; i >= 0; i--) {
      if (frac >= phases[i].t) return phases[i];
    }
    return phases[0];
  }

  function tick(now) {
    const elapsed = (now - startTime) % cycleDuration;
    const frac = elapsed / cycleDuration;

    // Sun arc: rises from left bottom → peaks at center top → sets right bottom
    const sunAngle = Math.PI * frac; // 0 = left horizon, PI = right horizon
    const sunX = W * frac;
    const sunY = H * 0.65 - Math.sin(sunAngle) * H * 0.52;
    const sunOpacity = Math.max(0, Math.min(1, Math.sin(sunAngle) * 3));
    sun.style.left = (sunX - 26) + 'px';
    sun.style.top = sunY + 'px';
    sun.style.opacity = String(sunOpacity);

    // Moon arc: offset by half cycle
    const moonFrac = (frac + 0.5) % 1;
    const moonAngle = Math.PI * moonFrac;
    const moonX = W * moonFrac;
    const moonY = H * 0.65 - Math.sin(moonAngle) * H * 0.52;
    const moonOpacity = Math.max(0, Math.min(1, Math.sin(moonAngle) * 3));
    moon.style.left = (moonX - 22) + 'px';
    moon.style.top = moonY + 'px';
    moon.style.opacity = String(moonOpacity);

    // Stars
    const p = getPhase(frac);
    starsLayer.style.opacity = String(p.stars);
    phaseLabel.textContent = p.label;

    animId = requestAnimationFrame(tick);
  }

  animId = requestAnimationFrame(tick);

  demoCleanup = () => {
    cancelAnimationFrame(animId);
    overlay.classList.remove('daynight-overlay');
  };
}

    function demoEKG(content, overlay) {
      overlay.classList.add('ekg-overlay');

      // Canvas for waveform
      const canvas = document.createElement('canvas');
      canvas.style.cssText = 'position:fixed;inset:0;z-index:1051;pointer-events:none;';
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      content.appendChild(canvas);
      const ctx = canvas.getContext('2d');

      // BPM display
      const bpmWrap = document.createElement('div');
      bpmWrap.className = 'ekg-bpm';
      const bpmNum = document.createElement('div');
      bpmNum.className = 'ekg-bpm-num';
      bpmNum.textContent = '65';
      const bpmLbl = document.createElement('div');
      bpmLbl.className = 'ekg-bpm-label';
      bpmLbl.textContent = 'BPM';
      bpmWrap.appendChild(bpmNum);
      bpmWrap.appendChild(bpmLbl);
      content.appendChild(bpmWrap);

      const msg = document.createElement('div');
      msg.className = 'ekg-message';
      msg.textContent = 'Your pulse says: time to move.';
      content.appendChild(msg);

      const W = canvas.width, H = canvas.height;
      const midY = H * 0.62;
      const lineY = midY;
      const speed = 3.2;
      let x = 0;
      let bpm = 65;
      let startTime = performance.now();

      // PQRST waveform generator (one beat cycle in pixels)
      function pqrst(t) {
        // t in [0,1] = one beat
        if (t < 0.12)  return 4 * Math.sin(t / 0.12 * Math.PI);          // P wave
        if (t < 0.22)  return 0;
        if (t < 0.28)  return -8 * Math.sin((t - 0.22) / 0.06 * Math.PI);// Q dip
        if (t < 0.38)  return 80 * Math.sin((t - 0.28) / 0.10 * Math.PI);// R spike
        if (t < 0.45)  return -20 * Math.sin((t - 0.38) / 0.07 * Math.PI);// S dip
        if (t < 0.62)  return 12 * Math.sin((t - 0.45) / 0.17 * Math.PI);// T wave
        return 0;
      }

      // Store the waveform history
      const history = new Float32Array(W);
      let writePos = 0;
      let pixPerBeat = (60 / bpm) * (speed * 60); // rough pixels per beat

      let lastFrameTime = performance.now();
      let beatPhase = 0;
      let animId;

      // Color lerp green -> urgent
      function getColor(t) {
        // t 0..1
        const r = Math.round(0 + t * 196);
        const g = Math.round(232 - t * 110);
        const b = Math.round(122 - t * 91);
        return `rgb(${r},${g},${b})`;
      }

      function animate(now) {
        const dt = (now - lastFrameTime) / 1000;
        lastFrameTime = now;

        // Update BPM (65 -> 85 over 6s)
        const elapsed = (now - startTime) / 1000;
        const progress = Math.min(1, elapsed / 6);
        bpm = 65 + progress * 20;
        bpmNum.textContent = Math.round(bpm);
        pixPerBeat = (60 / bpm) * speed * 60;

        const color = getColor(progress);
        bpmNum.style.color = color;
        bpmNum.style.textShadow = `0 0 30px ${color}80`;
        msg.style.color = color;

        // Advance beat phase
        const pxPerFrame = speed;
        beatPhase += pxPerFrame / pixPerBeat;
        if (beatPhase >= 1) beatPhase -= 1;

        // Write new samples
        const newPxCount = Math.round(pxPerFrame);
        for (let i = 0; i < newPxCount; i++) {
          const phase = ((beatPhase * pixPerBeat + i) % pixPerBeat) / pixPerBeat;
          history[writePos % W] = pqrst(phase);
          writePos++;
        }

        // Draw
        ctx.clearRect(0, 0, W, H);

        // Grid lines
        ctx.strokeStyle = 'rgba(0,80,30,0.25)';
        ctx.lineWidth = 1;
        for (let gx = 0; gx < W; gx += 60) {
          ctx.beginPath(); ctx.moveTo(gx, 0); ctx.lineTo(gx, H); ctx.stroke();
        }
        for (let gy = lineY - 200; gy < lineY + 200; gy += 40) {
          ctx.beginPath(); ctx.moveTo(0, gy); ctx.lineTo(W, gy); ctx.stroke();
        }

        // Waveform
        ctx.beginPath();
        ctx.strokeStyle = color;
        ctx.lineWidth = 2.5;
        ctx.shadowColor = color;
        ctx.shadowBlur = 12;

        let drawStart = writePos - W;
        for (let i = 0; i < W; i++) {
          const idx = ((drawStart + i) % W + W) % W;
          const py = lineY - history[idx];
          if (i === 0) ctx.moveTo(i, py);
          else ctx.lineTo(i, py);
        }
        ctx.stroke();
        ctx.shadowBlur = 0;

        // Scan line glow at write head
        const headX = (writePos) % W;
        const grad = ctx.createLinearGradient(headX - 40, 0, headX + 10, 0);
        grad.addColorStop(0, 'transparent');
        grad.addColorStop(1, `${color}40`);
        ctx.fillStyle = grad;
        ctx.fillRect(headX - 40, 0, 50, H);

        animId = requestAnimationFrame(animate);
      }

      animate(performance.now());

      demoCleanup = () => {
        cancelAnimationFrame(animId);
        overlay.classList.remove('ekg-overlay');
      };
    }

    function demoWhisper(content, overlay) {
      overlay.classList.add('whisper-overlay');

      // Particle canvas background
      const pCanvas = document.createElement('canvas');
      pCanvas.style.cssText = 'position:fixed;inset:0;z-index:1049;pointer-events:none;';
      pCanvas.width = window.innerWidth;
      pCanvas.height = window.innerHeight;

      // Floating particles
      const particles = Array.from({length: 40}, () => ({
        x: Math.random() * pCanvas.width,

      // Phase 1: left appears blurred (0.5s)
      const t1 = setTimeout(() => {
        left.classList.add('visible');
      }, 400);

      // Phase 2: right appears blurred (1.8s)
      const t2 = setTimeout(() => {
        right.classList.add('visible');
      }, 1800);

      // Phase 3: center appears sharp + left/right fade out (3.2s)
      const t3 = setTimeout(() => {
        left.style.opacity = '0';
        right.style.opacity = '0';
        center.classList.add('sharp');
      }, 3200);

      // Re-loop after 5.5s
      const t4 = setTimeout(() => {
        left.classList.remove('visible');
        right.classList.remove('visible');
        center.classList.remove('sharp');
        center.style.opacity = '0';
        setTimeout(() => {
          left.style.opacity = '';
          right.style.opacity = '';
          center.style.opacity = '';
          const t5 = setTimeout(() => left.classList.add('visible'), 400);
          const t6 = setTimeout(() => right.classList.add('visible'), 1800);
          const t7 = setTimeout(() => {
            left.style.opacity = '0';
            right.style.opacity = '0';
            center.classList.add('sharp');
          }, 3200);
          allTimers.push(t5, t6, t7);
        }, 600);
      }, 5500);

      const allTimers = [t1, t2, t3, t4];

      demoCleanup = () => {
        allTimers.forEach(clearTimeout);
        cancelAnimationFrame(animId);
        overlay.classList.remove('whisper-overlay');
      };
    }

    function demoMusicCountdown(content, overlay) {
      overlay.classList.add('music-overlay');

      const stage = document.createElement('div');
      stage.className = 'music-stage';
      content.appendChild(stage);

      // Staff lines
      const staff = document.createElement('div');
      staff.className = 'music-staff';
      stage.appendChild(staff);
      [20, 36, 52, 68, 84].forEach(top => {
        const line = document.createElement('div');
        line.className = 'music-staff-line';
        line.style.top = top + 'px';
        staff.appendChild(line);
      });

      // 5 notes
      const noteEmoji = ['♩','♪','♫','♬','𝅗𝅥'];
      const notePositions = [
        { left: '8%',  top: 14 },
        { left: '24%', top: 30 },
        { left: 'calc(50% - 16px)', top: 10 },
        { left: '64%', top: 36 },
        { left: '80%', top: 18 },
      ];
      const noteEls = [];
      notePositions.forEach((pos, i) => {
        const note = document.createElement('div');
        note.className = 'music-note';
        note.textContent = ['♩','♪','♫','♬','🎵'][i];
        note.style.left = pos.left;
        note.style.top = pos.top + 'px';
        note.style.color = `hsl(${40 + i*8}, 85%, ${65 + i*4}%)`;
        note.style.opacity = '0';
        note.style.transform = 'translateY(20px)';
        staff.appendChild(note);
        noteEls.push(note);
      });

      const tempoEl = document.createElement('div');
      tempoEl.className = 'music-tempo';
      tempoEl.textContent = '♩ = 72 bpm';
      stage.appendChild(tempoEl);

      const msgEl = document.createElement('div');
      msgEl.className = 'music-message';
      stage.appendChild(msgEl);

      const messages = [
        'The countdown begins…',
        'Four beats left…',
        'Three…',
        'Two…',
        'One…',
        '🎶 Time to go! 🎶',
      ];
      const tempos = ['♩ = 72 bpm','♩ = 80 bpm','♩ = 96 bpm','♩ = 112 bpm','♩ = 132 bpm',''];

      let currentNote = 0;
      let beatInterval = 1200;
      const timers = [];

      function revealNote(i) {
        if (i >= noteEls.length) return;
        noteEls[i].style.transition = 'opacity 0.3s ease, transform 0.3s var(--ease-bounce)';
        noteEls[i].style.opacity = '1';
        noteEls[i].style.transform = 'translateY(0)';
        msgEl.textContent = messages[i];
        tempoEl.textContent = tempos[i];
      }

      function bounceNote(i) {
        if (i >= noteEls.length) return;
        noteEls[i].style.animation = 'none';
        void noteEls[i].offsetWidth;
        noteEls[i].style.animation = 'noteBounce 0.5s var(--ease-bounce)';
      }

      function dismissNote(i) {
        if (i >= noteEls.length) return;
        noteEls[i].style.animation = 'noteFade 0.6s var(--ease) forwards';
      }

      // Phase 1: reveal all notes one by one
      for (let i = 0; i < 5; i++) {
        timers.push(setTimeout(() => revealNote(i), 300 + i * 500));
      }

      // Phase 2: bounce sequence with increasing tempo
      function runBounce(noteIdx, delay) {
        if (noteIdx >= 5) {
          // Final resolution: confetti!
          msgEl.textContent = messages[5];
          tempoEl.textContent = tempos[5];
          noteEls.forEach((_, i) => {
            timers.push(setTimeout(() => dismissNote(i), i * 80));
          });
          // Confetti burst
          const colors = ['#D4A847','#C4622D','#6F9272','#9B8EC4','#fff'];
          for (let c = 0; c < 48; c++) {
            const conf = document.createElement('div');
            conf.className = 'music-confetti';
            const cx = window.innerWidth / 2 + (Math.random() - 0.5) * 200;
            const cy = window.innerHeight / 2;
            const tx = (Math.random() - 0.5) * 400 + 'px';
            const ty = (Math.random() * -300 - 50) + 'px';
            const tr = (Math.random() * 720 - 360) + 'deg';
            conf.style.cssText = `
              left:${cx}px; top:${cy}px;
              background:${colors[c % colors.length]};
              --tx:${tx}; --ty:${ty}; --tr:${tr};
              animation-delay:${Math.random() * 0.3}s;
            `;
            content.appendChild(conf);
            timers.push(setTimeout(() => conf.remove(), 1600));
          }
          return;
        }
        timers.push(setTimeout(() => {
          bounceNote(noteIdx);
          runBounce(noteIdx + 1, beatInterval * 0.85);
          beatInterval *= 0.85;
        }, delay));
      }

      timers.push(setTimeout(() => runBounce(0, 100), 3000));

      demoCleanup = () => {
        timers.forEach(clearTimeout);
        overlay.classList.remove('music-overlay');
      };
    }

    function demoBossBattle(content, overlay) {
      overlay.classList.add('boss-overlay');

      // Starfield
      const starCanvas = document.createElement('canvas');
      starCanvas.className = 'boss-bg-stars';
      starCanvas.width = window.innerWidth;
      starCanvas.height = window.innerHeight;
      content.appendChild(starCanvas);
      const sCtx = starCanvas.getContext('2d');
      const stars = Array.from({length: 80}, () => ({
        x: Math.random() * starCanvas.width,
        y: Math.random() * starCanvas.height,
        r: 0.5 + Math.random() * 1.5,
        o: 0.3 + Math.random() * 0.5,
        twinkle: Math.random() * Math.PI * 2,
      }));
      let starAnimId;
      function drawStars() {
        sCtx.clearRect(0, 0, starCanvas.width, starCanvas.height);
        stars.forEach(s => {
          s.twinkle += 0.03;
          const op = s.o + 0.2 * Math.sin(s.twinkle);
          sCtx.beginPath();
          sCtx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
          sCtx.fillStyle = `rgba(255,255,255,${op})`;
          sCtx.fill();
        });
        starAnimId = requestAnimationFrame(drawStars);
      }
      drawStars();

      const arena = document.createElement('div');
      arena.className = 'boss-arena';
      content.appendChild(arena);

      // Health bars row
      const barsRow = document.createElement('div');
      barsRow.className = 'boss-bars-row';

      const playerHPBlock = document.createElement('div');
      playerHPBlock.className = 'boss-bar-block';
      playerHPBlock.innerHTML = `
        <div class="boss-bar-name player"><span>YOU</span><span id="boss-player-hp">100</span></div>
        <div class="boss-bar-track"><div class="boss-bar-fill player" id="boss-player-bar" style="width:100%"></div></div>
      `;

      const enemyHPBlock = document.createElement('div');
      enemyHPBlock.className = 'boss-bar-block';
      enemyHPBlock.innerHTML = `
        <div class="boss-bar-name enemy"><span>THE MEETING</span><span id="boss-enemy-hp">100</span></div>
        <div class="boss-bar-track"><div class="boss-bar-fill enemy" id="boss-enemy-bar" style="width:100%"></div></div>
      `;
      barsRow.appendChild(playerHPBlock);
      barsRow.appendChild(enemyHPBlock);
      arena.appendChild(barsRow);

      // Combatants
      const combatants = document.createElement('div');
      combatants.className = 'boss-combatants';

      const playerEntity = document.createElement('div');
      playerEntity.className = 'boss-entity';
      playerEntity.innerHTML = '<div class="boss-emoji float" id="boss-player-emoji">🧑‍💻</div><div class="boss-name-tag">YOU</div>';

      const vsBadge = document.createElement('div');
      vsBadge.className = 'vs-badge';
      vsBadge.textContent = 'vs';

      const bossEntity = document.createElement('div');
      bossEntity.className = 'boss-entity';
      bossEntity.innerHTML = '<div class="boss-emoji float" id="boss-enemy-emoji">🐉</div><div class="boss-name-tag">THE MEETING</div>';

      combatants.appendChild(playerEntity);
      combatants.appendChild(vsBadge);
      combatants.appendChild(bossEntity);
      arena.appendChild(combatants);

      // Dialog box
      const dialog = document.createElement('div');
      dialog.className = 'boss-dialog-box';
      dialog.id = 'boss-dialog';
      dialog.textContent = '⚔️  A wild MEETING approaches! Prepare your talking points!';
      arena.appendChild(dialog);

      // Action buttons
      const actions = document.createElement('div');
      actions.className = 'boss-actions';
      const actionDefs = [
        { icon: '📝', label: 'BRAIN DUMP', effect: 'prepare' },
        { icon: '⚔️',  label: 'TRANSITION', effect: 'attack' },
        { icon: '🛡️', label: 'STALL',       effect: 'defend' },
        { icon: '🏃', label: 'FLEE',        effect: 'flee' },
      ];

      let playerHP = 100, enemyHP = 100;
      const dialogLines = {
        prepare: ['You jot down your key points!', 'You feel focused and ready!', 'Notes captured! +15 confidence!'],
        attack:  ['You transition boldly!', 'Direct hit! Meeting flinches!', 'Decisive action! The Meeting reels!'],
        defend:  ['You buy 5 more minutes…', 'The Meeting glowers impatiently.', 'Stalling… but time is running out!'],
        flee:    ['You can\'t flee from your calendar!', 'The Meeting blocks your escape!', 'No retreat! The meeting is inescapable!'],
      };

      const timers = [];

      function flashDamage(amount, x, y, color) {
        const dmg = document.createElement('div');
        dmg.className = 'boss-damage';
        dmg.textContent = (amount > 0 ? '-' : '+') + Math.abs(amount);
        dmg.style.color = color || '#ffeb3b';
        dmg.style.left = (x - 20) + 'px';
        dmg.style.top = (y - 20) + 'px';
        content.appendChild(dmg);
        timers.push(setTimeout(() => dmg.remove(), 1000));
      }

      function updateBars() {
        const pb = document.getElementById('boss-player-bar');
        const eb = document.getElementById('boss-enemy-bar');
        const pn = document.getElementById('boss-player-hp');
        const en = document.getElementById('boss-enemy-hp');
        if (pb) pb.style.width = Math.max(0, playerHP) + '%';
        if (eb) eb.style.width = Math.max(0, enemyHP) + '%';
        if (pn) pn.textContent = Math.max(0, playerHP);
        if (en) en.textContent = Math.max(0, enemyHP);
      }

      function doAction(effect, btn) {
        const lines = dialogLines[effect];
        const line = lines[Math.floor(Math.random() * lines.length)];
        dialog.textContent = line;

        const bossEmoji = document.getElementById('boss-enemy-emoji');
        const playerEmoji = document.getElementById('boss-player-emoji');
        const bossRect = bossEmoji ? bossEmoji.getBoundingClientRect() : {left:600,top:300};
        const playerRect = playerEmoji ? playerEmoji.getBoundingClientRect() : {left:200,top:300};

        if (effect === 'attack' || effect === 'prepare') {
          const dmg = 12 + Math.floor(Math.random() * 18);
          enemyHP -= dmg;
          flashDamage(dmg, bossRect.left + 36, bossRect.top, '#ffeb3b');
          if (bossEmoji) {
            bossEmoji.classList.remove('float');
            bossEmoji.classList.add('rage');
            timers.push(setTimeout(() => {
              bossEmoji.classList.remove('rage');
              bossEmoji.classList.add('float');
            }, 800));
          }
          if (enemyHP <= 0) {
            dialog.textContent = '🎉 You won! The Meeting has been… attended!';
            timers.push(setTimeout(dismissDemo, 2000));
          }
        } else if (effect === 'defend') {
          const dmg = 8 + Math.floor(Math.random() * 8);
          playerHP -= dmg;
          flashDamage(dmg, playerRect.left + 36, playerRect.top, '#ef5350');
        } else if (effect === 'flee') {
          const dmg = 15 + Math.floor(Math.random() * 10);
          playerHP -= dmg;
          flashDamage(dmg, playerRect.left + 36, playerRect.top, '#ef5350');
          dialog.textContent = '😱 The Meeting punishes your cowardice! -' + dmg + ' HP!';
        }

        // Boss counter-attack (slower on attack/prepare)
        if (effect !== 'attack' && effect !== 'prepare') {
          // nothing extra
        } else {
          // small counter
          timers.push(setTimeout(() => {
            const cdmg = 5 + Math.floor(Math.random() * 8);
            playerHP -= cdmg;
            flashDamage(cdmg, playerRect.left + 36, playerRect.top + 20, '#ef5350');
            updateBars();
            if (playerHP <= 0) {
              dialog.textContent = '😵 You\'ve been Late-Joined to death! Transition NOW!';
            }
          }, 700));
        }

        updateBars();
      }

      actionDefs.forEach(def => {
        const btn = document.createElement('button');
        btn.className = 'boss-action-btn';
        btn.innerHTML = `<span class="boss-action-icon">${def.icon}</span>${def.label}<span class="boss-action-label">ACTION</span>`;
        btn.onclick = () => doAction(def.effect, btn);
        actions.appendChild(btn);
      });
      arena.appendChild(actions);

      // Periodic boss taunts
      const taunts = [
        '🐉  "Your agenda is weak, human."',
        '🐉  "5 minutes… tick tock…"',
        '🐉  "I\'ve been rescheduled 3 times. Face me."',
        '🐉  "Your camera will be ON."',
      ];
      let tIdx = 0;
      const tauntT = setInterval(() => {
        tIdx = (tIdx + 1) % taunts.length;
        dialog.textContent = taunts[tIdx];
      }, 4000);
      timers.push(tauntT);

      demoCleanup = () => {
        timers.forEach(t => typeof t === 'number' ? (t > 1000 ? clearInterval(t) : clearTimeout(t)) : null);
        clearInterval(tauntT);
        cancelAnimationFrame(starAnimId);
        overlay.classList.remove('boss-overlay');
      };
    }
